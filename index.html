<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق التشخيص السني الاحترافي | د. زكريا</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --p: #3b82f6; --s: #10b981; --w: #f59e0b; --d: #ef4444; --t: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--t); margin: 0; direction: rtl; line-height: 1.6; }
        
        .header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 3px solid var(--p); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 900px; margin: auto; padding: 15px; }

        /* Auth Screen */
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; margin-top: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .tab-row { display: flex; gap: 5px; margin-bottom: 25px; background: #0f172a; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #94a3b8; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--p); color: white; border-radius: 10px; }

        /* Forms & Inputs */
        .inp { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-p { background: var(--p); } .btn-s { background: var(--s); } .btn-w { background: var(--w); }

        /* Main Layout */
        #app { display: none; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #334155; color: white; cursor: pointer; font-weight: bold; }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }

        /* Diagnostic Cards */
        .case-card { background: var(--card); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 15px; margin-bottom: 12px; overflow: hidden; transition: 0.3s; }
        .case-head { padding: 18px; background: rgba(255,255,255,0.02); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .case-body { max-height: 0; overflow: hidden; transition: 0.4s ease-out; background: #161e2e; }
        .case-card.open .case-body { max-height: 1000px; padding: 20px; border-top: 1px solid #334155; }
        .label { color: var(--w); font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px; }
        .val { margin-bottom: 15px; font-size: 15px; color: #cbd5e1; border-right: 3px solid var(--p); padding-right: 10px; }

        /* Chat System */
        #chat-box { height: 400px; overflow-y: auto; background: #0f172a; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #334155; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; background: #1e293b; }
        .msg.me { align-self: flex-end; background: #1e40af; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hide { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <h2>🦷 منظومة التشخيص السني</h2>
    <div id="status" style="font-size: 11px; color: var(--s);">جاري التحقق من السحابة...</div>
</div>

<div class="container">
    <div id="auth-view" class="auth-box">
        <div class="tab-row">
            <button class="tab-btn active" onclick="sel('admin', this)">قفل المدير</button>
            <button class="tab-btn" onclick="sel('std', this)">دخول الطلاب</button>
            <button class="tab-btn" onclick="sel('reg', this)">طلب انضمام</button>
        </div>
        <div id="f-admin">
            <input type="password" id="pass-admin" class="inp" placeholder="كلمة السر">
            <button class="btn btn-p" onclick="login('admin')">دخول المسؤول</button>
        </div>
        <div id="f-std" class="hide">
            <input type="text" id="user-std" class="inp" placeholder="اسم المستخدم">
            <input type="password" id="pass-std" class="inp" placeholder="كلمة السر">
            <button class="btn btn-s" onclick="login('std')">دخول الطالب</button>
        </div>
        <div id="f-reg" class="hide">
            <input type="text" id="reg-n" class="inp" placeholder="الاسم الكامل">
            <input type="text" id="reg-u" class="inp" placeholder="اسم مستخدم جديد">
            <input type="password" id="reg-p" class="inp" placeholder="كلمة سر">
            <button class="btn btn-w" onclick="register()">إرسال طلب للمدير</button>
        </div>
    </div>

    <div id="app">
        <div class="nav">
            <button class="nav-btn" onclick="v('diag')">🔍 التشخيص</button>
            <button class="nav-btn" onclick="v('chat')">💬 النقاش</button>
            <button id="admin-link" class="nav-btn hide" style="background:var(--d)" onclick="v('admin')">⚙️ الإدارة</button>
        </div>

        <div id="view-diag" class="view active">
            <div style="background:var(--card); padding:20px; border-radius:15px; margin-bottom:20px">
                <input type="text" id="search-q" class="inp" placeholder="ابحث عن أعراض (ألم، نزف، تورم، حار)..." oninput="search()">
            </div>
            <div id="results"></div>
        </div>

        <div id="view-chat" class="view">
            <div id="chat-box"></div>
            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="btn" style="width:50px; background:#475569" onclick="document.getElementById('file').click()">📸</button>
                <input type="file" id="file" class="hide" accept="image/*" onchange="prepImg(this)">
                <input type="text" id="msg-t" class="inp" style="margin:0; flex:1" placeholder="اكتب سؤالاً أو حالة هنا...">
                <button class="btn btn-p" style="width:70px" onclick="send()">➤</button>
            </div>
            <p id="img-notif" class="hide" style="color:var(--s); font-size:12px">الصورة جاهزة للإرسال ✅</p>
        </div>

        <div id="view-admin" class="view">
            <div class="auth-box" style="margin-top:0; text-align:right">
                <h3 style="color:var(--p)">📥 تغذية قاعدة البيانات</h3>
                <textarea id="json-input" class="inp" style="height:120px; text-align:left; font-family:monospace" placeholder="الصق الـ 100 حالة هنا بصيغة JSON"></textarea>
                <button class="btn btn-p" onclick="saveData()">تحديث القاموس فوراً</button>
                <hr style="opacity:0.1; margin:25px 0">
                <h3 style="color:var(--s)">👥 إدارة الطلاب الجدد</h3>
                <div id="users-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
// Configuration
const firebaseConfig = { apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE", databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allCases = [], curUser = null, tmpImg = null;

// Firebase Connectivity
db.ref('.info/connected').on('value', s => {
    document.getElementById('status').innerText = s.val() ? "● متصل بالسحابة" : "○ جاري الاتصال...";
});

// UI Controls
function sel(t, b) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active');
    ['admin','std','reg'].forEach(i => document.getElementById('f-'+i).classList.add('hide'));
    document.getElementById('f-'+t).classList.remove('hide');
}

function v(id) {
    document.querySelectorAll('.view').forEach(vw => vw.classList.remove('active'));
    document.getElementById('view-'+id).classList.add('active');
}

// Auth & Users
function login(role) {
    if(role === 'admin') {
        const p = document.getElementById('pass-admin').value;
        if(p === '9591melas' || p === 'salem1959') {
            curUser = { n: "د. زكريا", role: "admin", id: "admin" };
            document.getElementById('admin-link').classList.remove('hide');
            launch();
        } else alert("خطأ في كلمة السر");
    } else {
        const u = document.getElementById('user-std').value;
        const p = document.getElementById('pass-std').value;
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && d.pass === p && d.status === 'active') { curUser = { n: d.name, role: "std", id: u }; launch(); }
            else alert("الحساب غير مفعل أو البيانات خاطئة");
        });
    }
}

function register() {
    const u = document.getElementById('reg-u').value, n = document.getElementById('reg-n').value, p = document.getElementById('reg-p').value;
    if(!u || !n || !p) return alert("اكمل البيانات");
    db.ref('users/'+u).set({ name: n, pass: p, status: 'pending' }).then(() => { alert("تم الإرسال بنجاح"); location.reload(); });
}

function launch() {
    document.getElementById('auth-view').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    db.ref('clinical_cases').on('value', s => { allCases = []; s.forEach(c => allCases.push(c.val())); });
    loadChat();
    if(curUser.role === 'admin') loadUsers();
}

// Diagnostic Engine
function search() {
    const q = document.getElementById('search-q').value.toLowerCase().trim();
    const res = document.getElementById('results');
    if(q.length < 2) { res.innerHTML = ""; return; }
    
    const matched = allCases.filter(c => 
        c.name.includes(q) || c.signs.includes(q) || (c.keywords && c.keywords.some(k => k.includes(q)))
    );

    res.innerHTML = matched.length ? "" : "لم يتم العثور على حالة مطابقة";
    matched.forEach(c => {
        const div = document.createElement('div');
        div.className = "case-card";
        div.innerHTML = `<div class="case-head" onclick="this.parentElement.classList.toggle('open')">
            <span><b>${c.name}</b> <small style="opacity:0.6">(${c.cat})</small></span> <span>▼</span>
        </div>
        <div class="case-body">
            <span class="label">🔍 العلامات السريرية:</span><div class="val">${c.signs}</div>
            <span class="label">✅ الخطة العلاجية:</span><div class="val">${c.treat}</div>
            <span class="label">⚖️ التشخيص التفريقي:</span><div class="val">${c.diff}</div>
        </div>`;
        res.appendChild(div);
    });
}

// Chat Logic
function prepImg(i) {
    const reader = new FileReader();
    reader.onload = e => { tmpImg = e.target.result; document.getElementById('img-notif').classList.remove('hide'); };
    reader.readAsDataURL(i.files[0]);
}

function send() {
    const text = document.getElementById('msg-t').value;
    if(!text && !tmpImg) return;
    db.ref('chat').push({ n: curUser.n, id: curUser.id, text: text, img: tmpImg || null, ts: Date.now() });
    document.getElementById('msg-t').value = ""; tmpImg = null; document.getElementById('img-notif').classList.add('hide');
}

function loadChat() {
    db.ref('chat').on('value', s => {
        const box = document.getElementById('chat-box'); box.innerHTML = "";
        s.forEach(m => {
            const d = m.val(); const isMe = d.id === curUser.id;
            box.innerHTML += `<div class="msg ${isMe?'me':''}">
                <small style="color:var(--w); font-size:10px">${d.n}</small>
                ${d.img ? `<img src="${d.img}" onclick="window.open(this.src)">` : ''}
                <div>${d.text}</div>
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
}

// Admin Logic
function saveData() {
    try {
        const data = JSON.parse(document.getElementById('json-input').value);
        data.forEach(x => db.ref('clinical_cases/'+x.id).set(x));
        alert("تم تحديث القاموس بنجاح!");
    } catch(e) { alert("خطأ في تنسيق الكود"); }
}

function loadUsers() {
    db.ref('users').on('value', s => {
        const l = document.getElementById('users-list'); l.innerHTML = "";
        s.forEach(u => {
            const d = u.val();
            if(d.status === 'pending') {
                l.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; background:#0f172a; padding:12px; border-radius:10px">
                    <span>${d.name}</span>
                    <button class="btn-s" style="width:auto; padding:5px 15px; border-radius:8px" onclick="db.ref('users/${u.key}').update({status:'active'})">تفعيل الحساب</button>
                </div>`;
            }
        });
    });
}
</script>
</body>
</html>
