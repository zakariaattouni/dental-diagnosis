<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشخيص سني ذكي - د. زكريا عطوني</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root{--bg:#020617;--card:#1e293b;--p:#3b82f6;--s:#10b981;--w:#f59e0b;--d:#ef4444;--t:#f8fafc;--m:#94a3b8}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
        
        .header{background:linear-gradient(135deg,#1e3a8a,#0f172a);padding:20px;text-align:center;border-bottom:3px solid var(--p)}
        .header h1{font-size:24px;margin:0}
        #status{font-size:12px;color:var(--m);margin-top:5px;padding:4px 8px;border-radius:6px;display:inline-block}
        .status-ok{background:#064e3b;color:#34d399}
        .status-warn{background:#451a03;color:#fbbf24}
        .status-err{background:#7f1d1d;color:#fca5a5}
        
        .auth{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
        .auth-card{background:var(--card);padding:25px;border-radius:16px;width:100%;max-width:380px;border:1px solid #334155}
        .tabs{display:flex;gap:4px;margin-bottom:20px;background:#0f172a;padding:4px;border-radius:12px}
        .tab{flex:1;padding:10px;border:none;background:transparent;color:var(--m);cursor:pointer;border-radius:8px;font-weight:600}
        .tab.active{background:var(--p);color:#fff}
        .inp{width:100%;padding:12px;margin:8px 0;border:1px solid #334155;border-radius:10px;background:#0f172a;color:#fff;text-align:center}
        .btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin:5px 0}
        .btn-p{background:var(--p);color:#fff}
        .btn-s{background:var(--s);color:#fff}
        .btn-g{background:#334155;color:#cbd5e1}
        
        .app{max-width:900px;margin:auto;padding:15px;display:none}
        .nav{display:flex;gap:8px;margin-bottom:15px}
        .view{display:none}
        .view.active{display:block;animation:f .3s}
        @keyframes f{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .card{background:var(--card);border-radius:12px;padding:15px;margin-bottom:12px;border:1px solid #334155}
        
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .stat{background:#0f172a;padding:10px;border-radius:8px;text-align:center}
        .stat-n{font-size:20px;font-weight:800;color:var(--p)}
        
        textarea{width:100%;padding:12px;border:1px solid #334155;border-radius:10px;background:#0f172a;color:#fff;min-height:100px;resize:vertical}
        
        .res{border-right:3px solid var(--p);background:#1a2234;padding:12px;border-radius:8px;margin:10px 0}
        .tag{display:inline-block;padding:2px 6px;background:#334155;border-radius:4px;font-size:10px;margin:2px;color:#93c5fd}
        .conf{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700}
        .c-h{background:#064e3b;color:#34d399}.c-m{background:#451a03;color:#fbbf24}.c-l{background:#1e293b;color:#94a3b8}
        
        .hide{display:none!important}        .empty{text-align:center;color:var(--m);padding:20px;background:#0f172a;border-radius:8px}
        
        @media(max-width:480px){.stats{grid-template-columns:1fr}.nav{flex-direction:column}}
    </style>
</head>

</div>

    </div>
</div>

        <button class="btn btn-g" style="flex:1" onclick="show('chat')">💬 دردشة</button>

        </div>
        <div id="res"></div>
    </div>

            <div class="stats">

// 🚀 بدء التطبيق
function startApp() {

    $('app').style.display = 'block';
    updateStatus();
    
    // مزامنة فايربيس فقط إذا كان متاحاً (بدون إيقاف التطبيق إذا فشل)

// ☁️ مزامنة حالة "أونلاين" مع فايربيس (آمنة)
async function syncOnline() {
    if(!db || !currentUser) return;
    try {
        const uid = currentUser.name.replace(/\s/g, '_');
        const ref = db.ref('online/' + uid);
        await ref.set({ name: currentUser.name, time: Date.now(), role: currentUser.role });
        ref.onDisconnect().remove();
        
        // تحديث القائمة لحظياً
        db.ref('online').on('value', snap => {
            $('stat-on').textContent = snap.numChildren();
            let names = [], rows = "";
            snap.forEach(c => {
                const u = c.val();
                names.push(u.name);
                rows += `<div style="padding:6px;border-bottom:1px solid #334155;display:flex;justify-content:space-between"><span>${u.name}</span><span style="color:var(--s)">●</span></div>`;
            });
            $('online-list').textContent = names.length ? names.join('، ') : "لا أحد متصل";
            $('users-table').innerHTML = rows || '<div class="empty">انتظر ظهور المتصلين...</div>';
            $('stat-users').textContent = names.length;
        });
    } catch(e) {
        console.warn("⚠️ تعذرت المزامنة:", e.message);
    }
}

    if(!input) return alert("اكتب الأعراض أولاً");
    
    // تطبيع النص ومعالجة النفي
    const norm = t => t.normalize('NFKD').replace(/[\u064B-\u065F]/g,'').replace(/[أإآ]/g,'ا').replace(/ة/g,'ه').replace(/\s+/g,' ').trim();
    const nInput = norm(input);
    const negations = new Set();
    [/لا\s+(\w+)/g,/بدون\s+(\w+)/g,/غير\s+(\w+)/g].forEach(rx => {
        let m; while((m = rx.exec(input)) !== null) negations.add(norm(m[1]));
    });
    
    // حساب الدرجات
    let results = [];
    for(const dis of KB) {
        let score = 0, matched = [], totalWeight = 0;        
        // وزن الكلمات الرئيسية
        for(const kw of dis.kw) {
            const kwN = norm(kw);
            const weight = 1 + (kwN.split(' ').length * 0.5) + (kwN.length / 10);
            totalWeight += weight;
            
            let found = false, quality = 0;
            // مطابقة مباشرة
            if(nInput.includes(kwN)) { found = true; quality = 1; }
            // مطابقة عبر المرادفات
            else {
                for(const [syn, target] of Object.entries(SYNONYMS)) {
                    if(norm(target) === kwN && nInput.includes(norm(syn))) {
                        found = true; quality = 0.9; break;
                    }
                }
            }
            
            if(found) {
                // خصم إذا كانت الكلمة منفية
                const mainWord = kwN.split(' ')[0];
                if(negations.has(mainWord) || negations.has(kwN)) {
                    score -= weight * 2; // خصم كبير للنفي
                } else {
                    score += weight * quality;
                    matched.push(kw);
                }
            }
        }
        
        // بونص للموقع
        if(dis.loc && nInput.includes(dis.loc)) score += 5;
        // بونص للطوارئ
        if(dis.sev === 'طوارئ' && /(طوارئ|مستشفى|اختناق|نزف شديد|تورم سريع)/.test(input)) score += 10;
        
        // حساب النسبة النهائية
        if(totalWeight > 0 && score > 3) {
            const finalScore = Math.min(99, Math.round((score / totalWeight) * 100));
            if(finalScore >= 25) {
                results.push({ ...dis, score: finalScore, matched });
            }
        }
    }
    
    // ترتيب وعرض النتائج
    results.sort((a,b) => b.score - a.score);
    displayResults(results.slice(0, 3));
}
function displayResults(arr) {
    const out = $('res');
    if(!arr.length) {
        out.innerHTML = `<div class="card" style="border-right:4px solid var(--w)"><b>🔍 لم أجد تطابقاً دقيقاً</b><br><small style="color:var(--m)">جرب كلمات مثل: "نابض"، "تورم"، "ليلي"، "بعد القلع"، "نازفة"</small></div>`;
        return;
    }
    
    let html = `<div class="card"><h4>📋 النتائج المقترحة:</h4>`;
    arr.forEach((r, i) => {
        const col = r.score >= 70 ? 'var(--s)' : r.score >= 40 ? 'var(--p)' : 'var(--w)';
        const confClass = r.score >= 70 ? 'c-h' : r.score >= 40 ? 'c-m' : 'c-l';
        html += `
        <div class="res" style="border-right-color:${col}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <b style="color:${col}">#${i+1} ${r.name}</b>
                <span class="conf ${confClass}">${r.score}% ثقة</span>
            </div>
            <div style="margin:5px 0">${r.matched.map(m => `<span class="tag">${m}</span>`).join('')}</div>
            <p style="font-size:12px;margin:5px 0"><b>📌 العلامات:</b> ${r.signs}</p>
            <p style="font-size:12px;color:var(--s);margin:5px 0"><b>💊 الخطة:</b> ${r.treat}</p>
            ${r.sev==='طوارئ' ? `<div class="emergency-box" style="background:#7f1d1d;color:#fca5a5;padding:8px;border-radius:6px;margin-top:8px;font-size:11px">⚠️ حالة طوارئ: تتطلب تدخلاً فورياً</div>` : ''}
        </div>`;
    });
    html += `<div style="font-size:10px;color:var(--m);text-align:center;margin-top:10px">🦷 أداة تعليمية • التشخيص النهائي يحتاج فحصاً سريرياً</div></div>`;
    out.innerHTML = html;
}

// 💬 الدردشة (تعمل مع فايربيس فقط)
function loadChat() {
    if(!db) { $('chat-box').innerHTML = '<div class="empty">الدردشة تتطلب اتصالاً بفايربيس</div>'; return; }
    db.ref('chat').limitToLast(50).on('child_added', snap => {
        const d = snap.val();
        const div = document.createElement('div');
        div.style.cssText = "background:#1e293b;padding:8px 12px;border-radius:12px;margin:4px 0;font-size:13px";
        div.innerHTML = `<b style="color:var(--p)">${d.name}</b>: ${d.text} <small style="color:var(--m)">${new Date(d.time).toLocaleTimeString()}</small>`;
        $('chat-box').appendChild(div);
        $('chat-box').scrollTop = 9999;
    });
}

function sendChat() {
    const txt = $('chat-inp').value.trim();
    if(!txt || !currentUser || !db) return;
    db.ref('chat').push({ name: currentUser.name, text: txt, time: Date.now() });
    $('chat-inp').value = '';
}

// 📥 إضافة حالات من JSON
function addCases() {
    const txt = $('json-in').value.trim();    if(!txt) return alert("الصق البيانات أولاً");
    try {
        const data = JSON.parse(txt);
        const arr = Array.isArray(data) ? data : [data];
        let added = 0;
        for(const c of arr) {
            if(c.id && c.name && !KB.find(x => x.id === c.id)) {
                KB.push({
                    id: c.id, name: c.name, cat: c.cat||"عام", sev: c.sev||"متوسط",
                    loc: c.loc||"فم", kw: c.keywords||[c.name], 
                    signs: c.signs||"", treat: c.treat||"", diff: c.diff||""
                });
                added++;
            }
        }
        alert(`✅ تمت إضافة ${added} حالة محلياً`);
        $('stat-cases').textContent = KB.length;
        
        // حفظ في فايربيس إذا متاح
        if(fbReady && db && added > 0) {
            const updates = {};
            arr.forEach(c => { if(c.id) updates['cases/' + c.id] = c; });
            db.ref().update(updates).catch(e => console.warn("⚠️ لم يحفظ في السحابة:", e.message));
        }
    } catch(e) {
        alert("❌ خطأ في JSON: " + e.message);
    }
}
