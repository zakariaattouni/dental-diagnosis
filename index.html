<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشخيص سني ذكي - د. زكريا عطوني</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root{--bg:#020617;--card:#1e293b;--p:#3b82f6;--s:#10b981;--w:#f59e0b;--d:#ef4444;--t:#f8fafc;--m:#94a3b8}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
        
        .header{background:linear-gradient(135deg,#1e3a8a,#0f172a);padding:20px;text-align:center;border-bottom:3px solid var(--p)}
        .header h1{font-size:24px;margin:0}
        #status{font-size:12px;color:var(--m);margin-top:5px;padding:4px 8px;border-radius:6px;display:inline-block}
        .status-ok{background:#064e3b;color:#34d399}
        .status-warn{background:#451a03;color:#fbbf24}
        .status-err{background:#7f1d1d;color:#fca5a5}
        
        .auth{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
        .auth-card{background:var(--card);padding:25px;border-radius:16px;width:100%;max-width:380px;border:1px solid #334155}
        .tabs{display:flex;gap:4px;margin-bottom:20px;background:#0f172a;padding:4px;border-radius:12px}
        .tab{flex:1;padding:10px;border:none;background:transparent;color:var(--m);cursor:pointer;border-radius:8px;font-weight:600}
        .tab.active{background:var(--p);color:#fff}
        .inp{width:100%;padding:12px;margin:8px 0;border:1px solid #334155;border-radius:10px;background:#0f172a;color:#fff;text-align:center}
        .btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin:5px 0}
        .btn-p{background:var(--p);color:#fff}
        .btn-s{background:var(--s);color:#fff}
        .btn-g{background:#334155;color:#cbd5e1}
        .btn-d{background:var(--d);color:#fff;padding:5px 10px;font-size:11px}
        .btn-w{background:var(--w);color:#fff;padding:5px 10px;font-size:11px}
        
        .app{max-width:900px;margin:auto;padding:15px;display:none}
        .nav{display:flex;gap:8px;margin-bottom:15px}
        .view{display:none}
        .view.active{display:block;animation:f .3s}
        @keyframes f{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .card{background:var(--card);border-radius:12px;padding:15px;margin-bottom:12px;border:1px solid #334155}
        
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .stat{background:#0f172a;padding:10px;border-radius:8px;text-align:center}
        .stat-n{font-size:20px;font-weight:800;color:var(--p)}
        
        textarea{width:100%;padding:12px;border:1px solid #334155;border-radius:10px;background:#0f172a;color:#fff;min-height:100px;resize:vertical}
        
        .res{border-right:3px solid var(--p);background:#1a2234;padding:12px;border-radius:8px;margin:10px 0}
        .tag{display:inline-block;padding:2px 6px;background:#334155;border-radius:4px;font-size:10px;margin:2px;color:#93c5fd}
        .conf{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700}
        .c-h{background:#064e3b;color:#34d399}.c-m{background:#451a03;color:#fbbf24}.c-l{background:#1e293b;color:#94a3b8}
        
        .hide{display:none!important}
        .empty{text-align:center;color:var(--m);padding:20px;background:#0f172a;border-radius:8px}
        
        /* تحسين جدول المستخدمين */
        .user-row{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #334155;font-size:13px}
        .user-info{display:flex;flex-direction:column;gap:2px}
        .u-active{color:var(--s)}.u-pending{color:var(--w)}.u-blocked{color:var(--d)}
        @media(max-width:480px){.stats{grid-template-columns:1fr}.nav{flex-direction:column}}
    </style>
</head>
<body>
<div class="header">
    <h1>🦷 مدرب التشخيص السني</h1>
    <div id="status" class="status-warn">⏳ جاري التهيئة...</div>
</div>
<div id="auth" class="auth">
    <div class="auth-card">
        <div class="tabs">
            <button class="tab active" onclick="sw('admin',this)">🔐 إداري</button>
            <button class="tab" onclick="sw('student',this)">🎓 طالب</button>
            <button class="tab" onclick="sw('new',this)">📝 جديد</button>
        </div>
        <div id="auth-admin">
            <input type="password" id="admin-pass" class="inp" placeholder="كلمة السر الإدارية">
            <button class="btn btn-p" onclick="loginAdmin()">دخول المسؤول</button>
        </div>
        <div id="auth-student" class="hide">
            <input type="text" id="std-user" class="inp" placeholder="اسم المستخدم">
            <input type="password" id="std-pass" class="inp" placeholder="كلمة السر">
            <button class="btn btn-s" onclick="loginStudent()">دخول الطالب</button>
        </div>
        <div id="auth-new" class="hide">
            <input type="text" id="reg-name" class="inp" placeholder="الاسم الكامل">
            <input type="text" id="reg-user" class="inp" placeholder="اسم المستخدم المطلوب">
            <input type="password" id="reg-pass" class="inp" placeholder="اختر كلمة سر">
            <button class="btn btn-p" onclick="registerRequest()">إرسال طلب انضمام</button>
        </div>
    </div>
</div>
<div id="app" class="app">
    <div class="nav">
        <button class="btn btn-p" style="flex:1" onclick="show('diag')">🔍 التشخيص</button>
        <button id="nav-admin" class="btn btn-s hide" style="flex:1" onclick="show('admin')">⚙️ الإدارة</button>
        <button class="btn btn-g" style="flex:1" onclick="show('chat')">💬 دردشة</button>
    </div>
    <div id="diag" class="view active">
        <div class="card">
            <h3>📋 وصف الحالة السريري</h3>
            <textarea id="sym" placeholder="مثال: ألم نابض ليلي في الضرس الأخير مع تورم لثوي..."></textarea>
            <button class="btn btn-p" onclick="runDiag()">🔬 تحليل بالذكاء المحلي</button>
        </div>
        <div id="res"></div>
    </div>
    <div id="admin" class="view">
        <div class="card">
            <h3>👥 إدارة الأعضاء والطلاب</h3>
            <div id="users-list" style="max-height: 400px; overflow-y: auto;">
                <div class="empty">جاري تحميل قائمة المستخدمين...</div>
            </div>
        </div>
        
        <div class="card">
            <h3>📊 الإحصائيات</h3>
            <div class="stats">
                <div class="stat"><div class="stat-n" id="stat-on">0</div><div>متصل</div></div>
                <div class="stat"><div class="stat-n" id="stat-cases">0</div><div>حالة</div></div>
                <div class="stat"><div class="stat-n" id="stat-users">0</div><div>مستخدم</div></div>
            </div>
        </div>
    </div>
    <div id="chat" class="view">
        <div class="card">
            <h3>💬 دردشة الفريق</h3>
            <div id="chat-box" style="height:250px;overflow-y:auto;background:#0f172a;border-radius:8px;padding:10px;margin-bottom:10px"></div>
            <div style="display:flex;gap:8px">
                <input type="text" id="chat-inp" class="inp" style="margin:0;flex:1" placeholder="اكتب رسالتك...">
                <button class="btn btn-p" style="width:auto;margin:0;padding:12px 20px" onclick="sendChat()">➤</button>
            </div>
        </div>
    </div>
</div>
<script>
const FB_CONFIG = { 
    apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE", 
    databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com" 
};
let db = null, fbReady = false, currentUser = null;
try {
    firebase.initializeApp(FB_CONFIG);
    db = firebase.database();
    db.ref('.info/connected').on('value', snap => {
        fbReady = (snap.val() === true);
        updateStatus();
    });
} catch(e) {
    updateStatus();
}
function updateStatus() {
    const s = document.getElementById('status');
    if(fbReady) { s.textContent = "🟢 متصل بفايربيس | " + (currentUser?.name || ""); s.className = "status-ok"; }
    else { s.textContent = "🟡 وضع أوفلاين - سجل الدخول للمزامنة"; s.className = "status-warn"; }
}
// 🔀 تبديل تبويبات الدخول
function sw(tab, btn) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['admin','student','new'].forEach(t => document.getElementById(`auth-${t}`).classList.add('hide'));
    document.getElementById(`auth-${tab}`).classList.remove('hide');
}
// 🔐 دخول المسؤول
function loginAdmin() {
    const pass = document.getElementById('admin-pass').value.trim();
    if(pass === "9591melas" || pass === "salem1959") {
        currentUser = { role: 'admin', name: 'د. عطوني' };
        document.getElementById('nav-admin').classList.remove('hide');
        startApp();
        loadUsersManager(); // تحميل نظام إدارة المستخدمين
    } else {
        alert("⚠️ كلمة السر غير صحيحة");
    }
}
// 🎓 دخول الطالب (نظام التحقق الجديد)
async function loginStudent() {
    const user = document.getElementById('std-user').value.trim();
    const pass = document.getElementById('std-pass').value.trim();
    
    if(!fbReady) return alert("يجب أن تكون متصلاً بالإنترنت لتسجيل الدخول");
    
    const snap = await db.ref('users/' + user).once('value');
    const data = snap.val();
    
    if(data && data.pass === pass) {
        if(data.status === 'active') {
            currentUser = { role: 'student', name: data.name, username: user };
            startApp();
        } else {
            alert("⚠️ حسابك قيد المراجعة أو معطل من قبل الإدارة.");
        }
    } else {
        alert("❌ اسم المستخدم أو كلمة السر خطأ");
    }
}
// 📝 طلب تسجيل جديد
function registerRequest() {
    const name = document.getElementById('reg-name').value.trim();
    const user = document.getElementById('reg-user').value.trim();
    const pass = document.getElementById('reg-pass').value.trim();
    
    if(!name || !user || !pass) return alert("يرجى ملء كافة الحقول");
    
    db.ref('users/' + user).set({
        name: name,
        pass: pass,
        status: 'pending', // الحالة الافتراضية
        requestedAt: Date.now()
    }).then(() => {
        alert("✅ تم إرسال طلبك. انتظر تفعيل الحساب من قبل الدكتور.");
        location.reload();
    });
}
// ⚙️ نظام إدارة المستخدمين (للإدمن فقط)
function loadUsersManager() {
    db.ref('users').on('value', snap => {
        const users = snap.val();
        const container = document.getElementById('users-list');
        let html = "";
        let count = 0;
        
        if(!users) {
            container.innerHTML = '<div class="empty">لا يوجد مستخدمون حالياً</div>';
            return;
        }
        for(let id in users) {
            count++;
            const u = users[id];
            const statusText = u.status === 'active' ? 'مفعل' : (u.status === 'pending' ? 'قيد الانتظار' : 'معطل');
            const statusClass = u.status === 'active' ? 'u-active' : (u.status === 'pending' ? 'u-pending' : 'u-blocked');
            
            html += `
            <div class="user-row">
                <div class="user-info">
                    <b>${u.name} (@${id})</b>
                    <span class="${statusClass}">${statusText}</span>
                </div>
                <div style="display:flex;gap:5px">
                    ${u.status !== 'active' ? `<button class="btn-s" style="padding:5px" onclick="updateUserStatus('${id}', 'active')">تفعيل</button>` : `<button class="btn-w" onclick="updateUserStatus('${id}', 'blocked')">تعطيل</button>`}
                    <button class="btn-d" onclick="deleteUser('${id}')">حذف</button>
                </div>
            </div>`;
        }
        container.innerHTML = html || '<div class="empty">لا يوجد طلبات حالياً</div>';
        document.getElementById('stat-users').textContent = count;
    });
}
function updateUserStatus(uid, newStatus) {
    db.ref('users/' + uid).update({ status: newStatus });
}
function deleteUser(uid) {
    if(confirm('هل أنت متأكد من حذف هذا المستخدم نهائياً؟')) {
        db.ref('users/' + uid).remove();
    }
}
// 🚀 بدء التطبيق واستمرارية الوظائف السابقة
function startApp() {
    document.getElementById('auth').classList.add('hide');
    document.getElementById('app').style.display = 'block';
    updateStatus();
    if(fbReady && db) {
        syncOnline();
        loadChat();
    }
}
function show(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
// --- (بقية الأكواد السابقة الخاصة بالتشخيص والدردشة تبقى كما هي دون تغيير) ---
const KB = [
    {id:"pulp_acute", name:"التهاب لب حاد", cat:"لبية", sev:"عالي", loc:"سن", kw:["نابض","ليلي","عفوي","لا ينام","ألم مستمر","حار","بارد"], signs:"ألم عفوي نابض يزداد ليلاً وعند الاستلقاء، حساسية للحرارة تستمر", treat:"علاج لبّي عاجل أو استئصال", diff:"ألم ليلي ذاتي + استجابة طويلة للبرد"},
    {id:"apical_abscess", name:"خراج ذروي حاد", cat:"عدوى", sev:"طوارئ", loc:"سن", kw:["تورم","انتفاخ","نقرة","قيح","صديد","حرارة","وجه","خد"], signs:"ألم شديد عند النقر العمودي، تورم لثوي أو وجهي، قد يصاحبها حمى", treat:"تصريف فوري + مضادات حيوية + علاج جذر", diff:"تورم + ألم نقر + صديد"},
    {id:"pericoronitis", name:"التهاب حول التاج (تواج)", cat:"جراحة", sev:"عالي", loc:"خلف", kw:["عقل","بلع","صعب","فتحة","خلف","رائحة","أذن"], signs:"التهاب الأنسجة حول تاج الرحى الثالثة المنطمرة جزئياً، صعوبة فتح الفم", treat:"غسيل موضعي، مضادات، ثم القلع الجراحي", diff:"موقع خلفي + غطاء لثوي ملتهب + رائحة"}
];
const SYNONYMS = {'يوجعني':'ألم','وجع':'ألم','نابض':'ألم نابض','ورم':'تورم','ضرس':'سن'};
function runDiag() {
    const input = document.getElementById('sym').value.toLowerCase().trim();
    if(!input) return alert("اكتب الأعراض أولاً");
    
    let results = [];
    for(const dis of KB) {
        let score = 0, matched = [];
        for(const kw of dis.kw) {
            if(input.includes(kw)) { score += 20; matched.push(kw); }
        }
        if(score > 0) results.push({ ...dis, score: Math.min(score, 99), matched });
    }
    displayResults(results.sort((a,b) => b.score - a.score).slice(0, 3));
}
function displayResults(arr) {
    const out = document.getElementById('res');
    if(!arr.length) { out.innerHTML = `<div class="card">لم يتم العثور على نتائج دقيقة</div>`; return; }
    let html = `<div class="card"><h4>📋 النتائج المقترحة:</h4>`;
    arr.forEach(r => {
        html += `<div class="res"><b>${r.name}</b> (${r.score}%)<br><small>${r.signs}</small><br><small style="color:var(--s)">${r.treat}</small></div>`;
    });
    out.innerHTML = html + "</div>";
}
async function syncOnline() {
    if(!db || !currentUser) return;
    const uid = currentUser.name.replace(/\s/g, '_');
    const ref = db.ref('online/' + uid);
    await ref.set({ name: currentUser.name, role: currentUser.role });
    ref.onDisconnect().remove();
    db.ref('online').on('value', snap => {
        document.getElementById('stat-on').textContent = snap.numChildren();
    });
}
function loadChat() {
    db.ref('chat').limitToLast(20).on('child_added', snap => {
        const d = snap.val();
        const div = document.createElement('div');
        div.style.cssText = "background:#1e293b;padding:8px;border-radius:8px;margin:4px 0;font-size:13px";
        div.innerHTML = `<b>${d.name}</b>: ${d.text}`;
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = 999;
    });
}
function sendChat() {
    const txt = document.getElementById('chat-inp').value;
    if(!txt) return;
    db.ref('chat').push({ name: currentUser.name, text: txt });
    document.getElementById('chat-inp').value = '';
}
window.addEventListener('load', () => {
    document.getElementById('stat-cases').textContent = KB.length;
});
</script>
</body>
</html>
