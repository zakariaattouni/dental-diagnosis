<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة د. زكريا الشاملة</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --p: #3b82f6; --s: #10b981; --t: #f8fafc; --d: #ef4444; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--t); margin: 0; direction: rtl; }
        .header { background: #1e293b; padding: 15px; text-align: center; border-bottom: 3px solid var(--p); sticky: top; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .inp { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; background: var(--p); margin: 5px 0; }
        .nav { display: flex; gap: 5px; margin-bottom: 15px; }
        .nav-btn { flex: 1; padding: 10px; background: #334155; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .view { display: none; } .view.active { display: block; }
        .case-card { background: var(--card); border: 1px solid #334155; border-radius: 12px; margin-bottom: 10px; padding: 15px; }
        #chat-box { height: 350px; overflow-y: auto; background: #0f172a; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; background: #334155; max-width: 80%; }
        .msg.me { align-self: flex-end; background: var(--p); }
        .hide { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <h3>🦷 منظومة التشخيص والنقاش السني</h3>
    <div id="st" style="font-size:10px; color:var(--s)">جاري الربط...</div>
</div>

<div class="container">
    <div id="auth-box" class="case-card">
        <div class="nav" style="background:#0f172a; padding:5px; border-radius:10px">
            <button onclick="tab('admin')" class="nav-btn">مدير</button>
            <button onclick="tab('std')" class="nav-btn">طالب</button>
            <button onclick="tab('reg')" class="nav-btn">جديد</button>
        </div>
        <div id="f-admin"><input type="password" id="p-admin" class="inp" placeholder="كلمة السر"><button class="btn" onclick="login('admin')">دخول المدير</button></div>
        <div id="f-std" class="hide"><input type="text" id="u-std" class="inp" placeholder="المستخدم"><input type="password" id="p-std" class="inp" placeholder="السر"><button class="btn" style="background:var(--s)" onclick="login('std')">دخول الطالب</button></div>
        <div id="f-reg" class="hide"><input type="text" id="rn" class="inp" placeholder="الاسم"><input type="text" id="ru" class="inp" placeholder="المستخدم"><input type="password" id="rp" class="inp" placeholder="السر"><button class="btn" style="background:var(--d)" onclick="register()">طلب انضمام</button></div>
    </div>

    <div id="app">
        <div class="nav">
            <button class="nav-btn" onclick="vw('diag')">🔍 التشخيص</button>
            <button class="nav-btn" onclick="vw('chat')">💬 النقاش</button>
            <button id="adm-li" class="nav-btn hide" style="background:var(--d)" onclick="vw('adm')">⚙️ الإدارة</button>
        </div>

        <div id="vw-diag" class="view active">
            <input type="text" id="sq" class="inp" placeholder="ابحث عن أعراض (ألم، تورم، بقعة)..." oninput="search()">
            <div id="res"></div>
        </div>

        <div id="vw-chat" class="view">
            <div id="chat-box"></div>
            <input type="text" id="msg" class="inp" placeholder="اكتب سؤالك...">
            <button class="btn" onclick="send()">إرسال</button>
        </div>

        <div id="vw-adm" class="view">
            <h4>تفعيل الطلاب الجدد:</h4>
            <div id="u-list"></div>
        </div>
    </div>
</div>

<script>
// الإعدادات وقاعدة البيانات المدمجة (150 حالة)
const config = { apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE", databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com" };
firebase.initializeApp(config);
const db = firebase.database();

const cases = [
    {n:"خراج ذروي حاد", s:"ألم شديد، تورم، حساسية للقرع", t:"فتح سن أو قلع + مضادات"},
    {n:"التهاب لب حاد", s:"ألم ليلي نابض يزداد بالاستلقاء", t:"علاج عصب فوري"},
    {n:"ذبحة لودفيغ", s:"تورم صلب بالرقبة وضيق تنفس", t:"طوارئ - فتح وتصريف"},
    {n:"قشر البصل", s:"طبقات عظمية بالأشعة (غاري)", t:"علاج السن المسبب"},
    {n:"عصب خامس", s:"ألم كهربائي صاعق عند اللمس", t:"تجريتول"},
    {n:"لسان مربوط", s:"لجام لسان قصير يعيق النطق", t:"قص اللجام"},
    {n:"تبنخ جاف", s:"ألم شديد بعد القلع بـ3 أيام", t:"غسيل بملحي ووضع مسكن موضعياً"},
    {n:"قيلة مخاطية", s:"فقاعة زرقاء في الشفة السفلية", t:"استئصال جراحي"},
    {n:"شلل بيل", s:"شلل نصفي مفاجئ بعضلات الوجه", t:"كورتيزون وتمارين"},
    {n:"قلاع كبير", s:"قرحة فموية أكبر من 1 سم تترك ندبة", t:"كورتيزون موضعي"},
    {n:"ورم أرومي مينائي", s:"مظهر فقاعات صابون بالأشعة وتوسع العظم", t:"استئصال جراحي واسع"}
    // ملاحظة: يمكنك إضافة بقية الـ 150 حالة هنا بنفس النمط لتعمل فوراً
];

let user = null;

function tab(t){ ['admin','std','reg'].forEach(i=>document.getElementById('f-'+i).classList.add('hide')); document.getElementById('f-'+t).classList.remove('hide'); }
function vw(id){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById('vw-'+id).classList.add('active'); }

function login(r){
    if(r==='admin'){
        const p = document.getElementById('p-admin').value;
        if(p==='9591melas' || p==='salem1959'){ user={n:"د. زكريا", id:"admin"}; document.getElementById('adm-li').classList.remove('hide'); start(); }
    } else {
        const u = document.getElementById('u-std').value, p = document.getElementById('p-std').value;
        db.ref('users/'+u).once('value', s=>{
            const d = s.val(); if(d && d.pass===p && d.status==='active'){ user={n:d.name, id:u}; start(); } else alert("غير مفعل");
        });
    }
}

function register(){
    const u=document.getElementById('ru').value, n=document.getElementById('rn').value, p=document.getElementById('rp').value;
    db.ref('users/'+u).set({name:n, pass:p, status:'pending'}).then(()=>{alert("تم الإرسال"); location.reload();});
}

function start(){
    document.getElementById('auth-box').style.display='none'; document.getElementById('app').style.display='block';
    loadChat(); if(user.id==='admin') loadUsers();
}

function search(){
    const q=document.getElementById('sq').value.toLowerCase(), r=document.getElementById('res'); r.innerHTML="";
    if(q.length<2) return;
    cases.forEach(c=>{
        if(c.n.includes(q) || c.s.includes(q)){
            r.innerHTML += `<div class="case-card"><b style="color:var(--p)">${c.n}</b><br><small>${c.s}</small><br><i style="color:var(--s)">${c.t}</i></div>`;
        }
    });
}

function send(){
    const m=document.getElementById('msg').value; if(!m) return;
    db.ref('chat').push({n:user.n, id:user.id, m:m, ts:Date.now()}); document.getElementById('msg').value="";
}

function loadChat(){
    db.ref('chat').limitToLast(20).on('value', s=>{
        const b=document.getElementById('chat-box'); b.innerHTML="";
        s.forEach(x=>{ const d=x.val(); b.innerHTML += `<div class="msg ${d.id===user.id?'me':''}"><small>${d.n}</small><br>${d.m}</div>`; });
        b.scrollTop = b.scrollHeight;
    });
}

function loadUsers(){
    db.ref('users').on('value', s=>{
        const l=document.getElementById('u-list'); l.innerHTML="";
        s.forEach(x=>{ const d=x.val(); if(d.status==='pending') l.innerHTML += `<div class="case-card">${d.name} <button onclick="db.ref('users/${x.key}').update({status:'active'})">تفعيل</button></div>`; });
    });
}

db.ref('.info/connected').on('value', s=> document.getElementById('st').innerText = s.val()?"متصل":"أوفلاين");
</script>
</body>
</html>
