<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرب التشخيص السني | د. زكريا</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root{
            --bg:#0f172a; --card:#1e293b; --p:#3b82f6; --s:#10b981; 
            --w:#f59e0b; --d:#ef4444; --t:#f8fafc; --m:#94a3b8;
            --grad: linear-gradient(135deg, #3b82f6, #1e40af);
        }
        *{box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif}
        body{background:var(--bg); color:var(--t); min-height:100vh; line-height: 1.6}

        /* هيدر عصري */
        .header{background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding:20px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); sticky; top:0; z-index:100}
        .header h1 { font-size: 1.5rem; letter-spacing: 1px; color: var(--t) }
        #status{font-size:10px; margin-top:8px; padding:4px 12px; border-radius:20px; font-weight: bold}
        .status-ok{background:rgba(16, 185, 129, 0.2); color:var(--s)}
        .status-warn{background:rgba(245, 158, 11, 0.2); color:var(--w)}

        /* التنقل */
        .nav{display:flex; gap:10px; padding:15px; max-width:900px; margin:auto}
        .nav .btn{flex:1; padding:12px; border-radius:12px; border:none; color:#fff; font-weight:bold; cursor:pointer; transition: 0.3s; display:flex; align-items:center; justify-content:center; gap:8px}
        .btn-diag{background: var(--grad); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3)}
        .btn-chat{background: #334155}
        .btn-admin{background: #475569}

        /* واجهة التشخيص الجديدة */
        .container{max-width:900px; margin:auto; padding:0 15px 100px}
        .view{display:none} .view.active{display:block; animation: fadeIn 0.5s}
        
        .search-container{background:var(--card); padding:20px; border-radius:20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom:25px; border: 1px solid rgba(255,255,255,0.05)}
        .search-title{font-weight:bold; color:var(--p); margin-bottom:12px; display:flex; align-items:center; gap:8px}
        .inp-search{width:100%; padding:15px; border-radius:12px; border:2px solid #334155; background:#0f172a; color:#fff; font-size:16px; transition:0.3s}
        .inp-search:focus{border-color:var(--p); outline:none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1)}

        /* بطاقات النتائج */
        .case-card{background:var(--card); border-radius:18px; margin-bottom:15px; overflow:hidden; border:1px solid rgba(255,255,255,0.05); transition: 0.3s}
        .case-header{padding:18px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; background: rgba(255,255,255,0.02)}
        .case-header:hover{background: rgba(255,255,255,0.05)}
        .case-title{font-size:1.1rem; font-weight:bold; color:var(--t)}
        .case-badge{font-size:11px; background:var(--p); color:#fff; padding:3px 10px; border-radius:8px}
        
        .case-content{padding:0 18px; max-height:0; overflow:hidden; transition: max-height 0.3s ease-out; background: #1a2233}
        .case-card.open .case-content{max-height: 1000px; padding: 18px}
        .case-card.open .chevron{transform: rotate(180deg)}
        
        .info-row{margin-bottom:12px; display:flex; flex-direction:column; gap:4px}
        .info-row label{font-size:12px; font-weight:bold; color:var(--m); display:flex; align-items:center; gap:5px}
        .info-row p{font-size:14px; color:#cbd5e1}

        /* الدخول والإدارة */
        .auth-screen{display:flex; align-items:center; justify-content:center; padding:20px; height:80vh}
        .auth-box{background:var(--card); padding:30px; border-radius:24px; width:100%; max-width:400px; text-align:center}
        
        @keyframes fadeIn { from{opacity:0; transform: translateY(10px)} to{opacity:1; transform: translateY(0)} }
        .chevron{transition: 0.3s; color:var(--m)}
        .hide{display:none!important}
    </style>
</head>
<body>

<div class="header">
    <h1>🦷 مدرب التشخيص</h1>
    <div id="status" class="status-warn">⏳ جاري الاتصال...</div>
</div>

<div id="auth" class="auth-screen">
    <div class="auth-box">
        <h2 style="margin-bottom:20px">مرحباً بك دكتور</h2>
        <div style="display:flex; gap:5px; margin-bottom:20px; background:#0f172a; padding:5px; border-radius:12px">
            <button class="tab-btn active" style="flex:1; padding:8px; border:none; border-radius:8px; cursor:pointer" id="tab-admin" onclick="selTab('admin')">إدارة</button>
            <button class="tab-btn" style="flex:1; padding:8px; border:none; border-radius:8px; cursor:pointer" id="tab-std" onclick="selTab('std')">طالب</button>
        </div>
        <div id="form-admin">
            <input type="password" id="pass" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:#0f172a; color:#fff; text-align:center" placeholder="كلمة السر">
            <button class="btn btn-diag" style="width:100%" onclick="login('admin')">دخول الإدارة</button>
        </div>
        <div id="form-std" class="hide">
            <input type="text" id="user" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:#0f172a; color:#fff" placeholder="اسم المستخدم">
            <button class="btn btn-diag" style="width:100%; background:var(--s)" onclick="login('std')">دخول الطلاب</button>
        </div>
    </div>
</div>

<div id="app" class="hide">
    <div class="nav">
        <button class="btn btn-diag" onclick="show('view-diag')">🔍 التشخيص</button>
        <button class="btn btn-chat" onclick="show('view-chat')">💬 النقاش</button>
        <button id="admin-link" class="btn btn-admin hide" onclick="show('view-admin')">⚙️ الإدارة</button>
    </div>

    <div class="container">
        <div id="view-diag" class="view active">
            <div class="search-container">
                <div class="search-title">🧪 تحليل الحالة السريرية</div>
                <input type="text" id="search-input" class="inp-search" placeholder="اكتب الأعراض هنا (مثلاً: ألم عند العض، نزف لثوي)..." oninput="doSearch()">
            </div>
            
            <div id="search-results">
                </div>
        </div>

        <div id="view-admin" class="view">
            <div class="search-container">
                <h3 style="margin-bottom:15px">تحديث قاعدة البيانات</h3>
                <textarea id="json-raw" style="width:100%; height:100px; background:#0f172a; color:var(--s); border:none; padding:10px; border-radius:10px; font-family:monospace" placeholder="الصق كود JSON هنا..."></textarea>
                <button class="btn btn-diag" style="margin-top:10px; width:100%" onclick="importData()">استيراد الحالات</button>
            </div>
            <div id="user-mgr" class="search-container">
                <h3 style="margin-bottom:10px">إدارة طلبات التفعيل</h3>
                <div id="users-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
// الإعدادات
const config = { apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE", databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com" };
firebase.initializeApp(config);
const db = firebase.database();

let allCases = [];
let userSession = null;

// الربط مع Firebase
db.ref('.info/connected').on('value', s => {
    const st = document.getElementById('status');
    st.className = s.val() ? "status-ok" : "status-warn";
    st.innerText = s.val() ? "● متصل بالسحابة" : "○ غير متصل";
});

// وظائف الدخول
function selTab(t) {
    document.getElementById('form-admin').classList.toggle('hide', t!=='admin');
    document.getElementById('form-std').classList.toggle('hide', t!=='std');
    document.getElementById('tab-admin').classList.toggle('active', t==='admin');
    document.getElementById('tab-std').classList.toggle('active', t==='std');
}

function login(role) {
    const p = document.getElementById('pass').value;
    if(role === 'admin' && (p === '9591melas' || p === 'salem1959')) {
        userSession = { role: 'admin' };
        document.getElementById('admin-link').classList.remove('hide');
        launch();
    } else if(role === 'std') {
        // يمكن إضافة منطق دخول الطلاب هنا
        userSession = { role: 'student' };
        launch();
    } else alert("خطأ في البيانات");
}

function launch() {
    document.getElementById('auth').classList.add('hide');
    document.getElementById('app').classList.remove('hide');
    loadData();
}

function show(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// جلب البيانات
function loadData() {
    db.ref('clinical_cases').on('value', snap => {
        allCases = [];
        snap.forEach(c => allCases.push(c.val()));
    });
}

// البحث والجماليات
function doSearch() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    const res = document.getElementById('search-results');
    
    if(q.length < 2) {
        res.innerHTML = '<div style="text-align:center; opacity:0.5; padding:40px">ابدأ بكتابة الأعراض للتشخيص...</div>';
        return;
    }

    const matched = allCases.filter(c => 
        c.name.toLowerCase().includes(q) || 
        c.signs.toLowerCase().includes(q) || 
        c.keywords.some(k => k.toLowerCase().includes(q))
    );

    res.innerHTML = matched.length ? "" : '<div style="text-align:center; color:var(--d); padding:40px">⚠️ لم يتم العثور على حالة مطابقة</div>';

    matched.forEach(c => {
        const card = document.createElement('div');
        card.className = "case-card";
        card.innerHTML = `
            <div class="case-header" onclick="this.parentElement.classList.toggle('open')">
                <div>
                    <span class="case-badge">${c.cat}</span>
                    <span class="case-title">${c.name}</span>
                </div>
                <span class="chevron">▼</span>
            </div>
            <div class="case-content">
                <div class="info-row">
                    <label>🔍 العلامات السريرية:</label>
                    <p>${c.signs}</p>
                </div>
                <div class="info-row">
                    <label>✅ الخطة العلاجية:</label>
                    <p>${c.treat}</p>
                </div>
                <div class="info-row">
                    <label>⚖️ التشخيص التفريقي:</label>
                    <p>${c.diff}</p>
                </div>
            </div>
        `;
        res.appendChild(card);
    });
}

// استيراد البيانات من الإدارة
function importData() {
    try {
        const data = JSON.parse(document.getElementById('json-raw').value);
        data.forEach(item => db.ref('clinical_cases/' + item.id).set(item));
        alert("تم تحديث " + data.length + " حالة بنجاح");
    } catch(e) { alert("خطأ في تنسيق JSON"); }
}
</script>

</body>
</html>
