<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرب التشخيص السني - د. زكريا عطوني</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root{--bg:#020617;--card:#1e293b;--p:#3b82f6;--s:#10b981;--w:#f59e0b;--d:#ef4444;--t:#f8fafc;--m:#94a3b8}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
        
        .header{background:linear-gradient(135deg,#1e3a8a,#0f172a);padding:15px;text-align:center;border-bottom:3px solid var(--p)}
        #status{font-size:11px;color:var(--m);margin-top:5px;padding:4px 8px;border-radius:6px;display:inline-block}
        .status-ok{background:#064e3b;color:#34d399}
        .status-warn{background:#451a03;color:#fbbf24}
        
        .auth{flex:1;display:flex;align-items:center;justify-content:center;padding:15px}
        .auth-card{background:var(--card);padding:20px;border-radius:16px;width:100%;max-width:380px;border:1px solid #334155}
        .tabs{display:flex;gap:4px;margin-bottom:15px;background:#0f172a;padding:4px;border-radius:12px}
        .tab{flex:1;padding:10px;border:none;background:transparent;color:var(--m);cursor:pointer;border-radius:8px;font-weight:600;font-size:14px}
        .tab.active{background:var(--p);color:#fff}
        
        .inp{width:100%;padding:12px;margin:6px 0;border:1px solid #334155;border-radius:10px;background:#0f172a;color:#fff;text-align:center}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin:5px 0}
        .btn-p{background:var(--p);color:#fff}
        .btn-s{background:var(--s);color:#fff}
        .btn-d{background:var(--d);color:#fff;font-size:11px;padding:5px}
        
        .app{max-width:900px;margin:auto;padding:10px;display:none;width:100%}
        .nav{display:flex;gap:5px;margin-bottom:10px}
        .view{display:none}.view.active{display:block;animation:f .3s}
        @keyframes f{from{opacity:0}to{opacity:1}}
        
        .card{background:var(--card);border-radius:12px;padding:15px;margin-bottom:10px;border:1px solid #334155}
        
        /* الدردشة */
        #chat-box{height:450px;overflow-y:auto;background:#0f172a;border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px}
        .msg{background:#1e293b;padding:10px;border-radius:12px;max-width:85%;align-self:flex-start;position:relative;border:1px solid #334155}
        .msg.me{align-self:flex-end;background:#1e3a8a;border-color:var(--p)}
        .msg-user{font-size:10px;font-weight:bold;color:var(--p);display:block;margin-bottom:3px}
        .msg-img{max-width:100%;border-radius:8px;margin:5px 0;border:1px solid #ffffff22;display:block}
        .msg-reply-ref{background:rgba(0,0,0,0.3);padding:5px;border-radius:5px;font-size:10px;border-right:3px solid var(--w);margin-bottom:5px;color:var(--m)}
        .msg-actions{display:flex;gap:12px;margin-top:5px;font-size:10px;color:var(--m)}
        
        #reply-preview{background:var(--card);padding:8px;border-radius:10px 10px 0 0;border-bottom:2px solid var(--w);display:none}
        .chat-tools{display:flex;gap:5px;background:#1e293b;padding:8px;border-radius:0 0 10px 10px}
        
        .user-row{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #334155;align-items:center}
        .hide{display:none!important}
    </style>
</head>
<body>

<div class="header">
    <h1>🦷 مدرب التشخيص السني</h1>
    <div id="status" class="status-warn">⏳ جاري الاتصال...</div>
</div>

<div id="auth" class="auth">
    <div class="auth-card">
        <div class="tabs">
            <button class="tab active" onclick="sw('admin',this)">🔐 إداري</button>
            <button class="tab" onclick="sw('student',this)">🎓 طالب</button>
            <button class="tab" onclick="sw('new',this)">📝 جديد</button>
        </div>
        <div id="auth-admin">
            <input type="password" id="admin-pass" class="inp" placeholder="كلمة السر الإدارية">
            <button class="btn btn-p" onclick="loginAdmin()">دخول المسؤول</button>
        </div>
        <div id="auth-student" class="hide">
            <input type="text" id="std-user" class="inp" placeholder="اسم المستخدم">
            <input type="password" id="std-pass" class="inp" placeholder="كلمة السر">
            <button class="btn btn-s" onclick="loginStudent()">دخول الطالب</button>
        </div>
        <div id="auth-new" class="hide">
            <input type="text" id="reg-name" class="inp" placeholder="الاسم الكامل">
            <input type="text" id="reg-user" class="inp" placeholder="اسم المستخدم المطلوب">
            <input type="password" id="reg-pass" class="inp" placeholder="كلمة السر">
            <button class="btn btn-p" onclick="registerRequest()">إرسال طلب تسجيل</button>
        </div>
    </div>
</div>

<div id="app" class="app">
    <div class="nav">
        <button class="btn btn-p" style="flex:1" onclick="show('diag')">🔍 التشخيص</button>
        <button class="btn btn-g" style="flex:1" onclick="show('chat')">💬 الدردشة</button>
        <button id="nav-admin" class="btn btn-s hide" style="flex:1" onclick="show('admin')">⚙️ الإدارة</button>
    </div>

    <div id="diag" class="view active">
        <div class="card">
            <h3>📋 وصف الحالة</h3>
            <textarea id="sym" class="inp" style="height:100px; text-align:right" placeholder="اكتب الأعراض هنا..."></textarea>
            <button class="btn btn-p" onclick="runDiag()">🔬 تحليل الحالة</button>
        </div>
        <div id="res"></div>
    </div>

    <div id="chat" class="view">
        <div id="chat-box"></div>
        <div id="reply-preview">
            <div style="display:flex; justify-content:space-between; font-size:11px">
                <span id="reply-text" style="color:var(--w)"></span>
                <span onclick="cancelReply()" style="cursor:pointer">✕</span>
            </div>
        </div>
        <div class="chat-tools">
            <button type="button" class="btn" style="background:#334155; width:auto; padding:10px 15px;" onclick="document.getElementById('img-input').click()">📎</button>
            <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImg(this)">
            <input type="text" id="chat-inp" class="inp" style="margin:0; flex:1" placeholder="اكتب رسالة...">
            <button class="btn btn-p" style="width:auto; margin:0; padding:10px 18px" onclick="sendChat()">➤</button>
        </div>
        <div id="img-preview-label" style="display:none; color:var(--s); font-size:11px; padding:5px">📸 تم إرفاق صورة</div>
    </div>

    <div id="admin" class="view">
        <div class="card">
            <h3>👥 طلبات التسجيل والأعضاء</h3>
            <div id="users-list"></div>
        </div>
    </div>
</div>

<script>
// --- إعدادات فايربيس ---
const FB_CONFIG = { 
    apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE", 
    databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com" 
};

let db = null, fbReady = false, currentUser = null, selectedImg = null, replyTo = null;

try {
    firebase.initializeApp(FB_CONFIG);
    db = firebase.database();
    db.ref('.info/connected').on('value', s => { fbReady = s.val(); updateStatus(); });
} catch(e) { updateStatus(); }

function updateStatus() {
    const s = document.getElementById('status');
    s.textContent = fbReady ? "🟢 متصل بالسحابة | " + (currentUser?.name || "") : "🟡 وضع أوفلاين";
    s.className = fbReady ? "status-ok" : "status-warn";
}

// --- نظام الدخول ---
function sw(tab, btn) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['admin','student','new'].forEach(t => document.getElementById(`auth-${t}`).classList.add('hide'));
    document.getElementById(`auth-${tab}`).classList.remove('hide');
}

function loginAdmin() {
    const pass = document.getElementById('admin-pass').value;
    if(pass === "9591melas" || pass === "salem1959") {
        currentUser = { role: 'admin', name: 'د. عطوني', username: 'admin' };
        document.getElementById('nav-admin').classList.remove('hide');
        startApp();
        loadUsersManager();
    } else alert("كلمة السر خطأ");
}

async function loginStudent() {
    const u = document.getElementById('std-user').value;
    const p = document.getElementById('std-pass').value;
    const snap = await db.ref('users/' + u).once('value');
    const data = snap.val();
    if(data && data.pass === p && data.status === 'active') {
        currentUser = { role: 'student', name: data.name, username: u };
        startApp();
    } else alert("الحساب غير مفعل أو البيانات خطأ");
}

function registerRequest() {
    const u = document.getElementById('reg-user').value;
    const n = document.getElementById('reg-name').value;
    const p = document.getElementById('reg-pass').value;
    if(!u || !n || !p) return alert("املأ البيانات");
    db.ref('users/' + u).set({ name: n, pass: p, status: 'pending' })
    .then(() => { alert("تم الإرسال.. بانتظار تفعيل الدكتور زكريا"); location.reload(); });
}

function startApp() {
    document.getElementById('auth').classList.add('hide');
    document.getElementById('app').style.display = 'block';
    loadChat();
}

// --- الدردشة المتطورة ---
function handleImg(input) {
    const file = input.files[0];
    if (file) {
        if (file.size > 1.5 * 1024 * 1024) return alert("الصورة كبيرة جداً");
        const reader = new FileReader();
        reader.onload = (e) => {
            selectedImg = e.target.result;
            document.getElementById('img-preview-label').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

function sendChat() {
    const txt = document.getElementById('chat-inp').value.trim();
    if(!txt && !selectedImg) return;

    db.ref('chat').push({
        name: currentUser.name,
        user: currentUser.username,
        text: txt,
        img: selectedImg || null,
        reply: replyTo || null,
        time: Date.now()
    });

    document.getElementById('chat-inp').value = '';
    selectedImg = null;
    replyTo = null;
    document.getElementById('img-preview-label').style.display = 'none';
    document.getElementById('reply-preview').style.display = 'none';
    document.getElementById('img-input').value = "";
}

function loadChat() {
    db.ref('chat').on('value', snap => {
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        snap.forEach(child => {
            const m = child.val();
            const id = child.key;
            const isMe = m.user === currentUser.username;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : ''}`;
            div.innerHTML = `
                <span class="msg-user">${m.name}</span>
                ${m.reply ? `<div class="msg-reply-ref">رد على: ${m.reply.text.substring(0,30)}..</div>` : ''}
                ${m.img ? `<img src="${m.img}" class="msg-img" onclick="window.open(this.src)">` : ''}
                <div style="word-break:break-word">${m.text}</div>
                <div class="msg-actions">
                    <span onclick="setReply('${id}', '${m.text}')" style="cursor:pointer">↩ رد</span>
                    ${(isMe || currentUser.role === 'admin') ? `<span style="color:var(--d); cursor:pointer" onclick="deleteMsg('${id}')">🗑 حذف</span>` : ''}
                </div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

function setReply(id, text) {
    replyTo = { id, text };
    document.getElementById('reply-preview').style.display = 'block';
    document.getElementById('reply-text').textContent = "رد على: " + text;
}

function cancelReply() {
    replyTo = null;
    document.getElementById('reply-preview').style.display = 'none';
}

function deleteMsg(id) {
    if(confirm('حذف هذه الرسالة؟')) db.ref('chat/' + id).remove();
}

// --- إدارة الأعضاء ---
function loadUsersManager() {
    db.ref('users').on('value', snap => {
        const list = document.getElementById('users-list');
        list.innerHTML = '';
        snap.forEach(u => {
            const data = u.val(); const id = u.key;
            list.innerHTML += `
                <div class="user-row">
                    <div><b>${data.name}</b> <br><small>${data.status}</small></div>
                    <div style="display:flex; gap:5px">
                        ${data.status === 'pending' ? `<button class="btn btn-s" style="padding:5px 10px" onclick="db.ref('users/${id}').update({status:'active'})">تفعيل</button>` : ''}
                        <button class="btn btn-d" onclick="if(confirm('حذف الحساب؟')) db.ref('users/${id}').remove()">حذف</button>
                    </div>
                </div>`;
        });
    });
}

// --- محرك التشخيص ---
function runDiag() {
    const input = document.getElementById('sym').value;
    if(!input) return;
    document.getElementById('res').innerHTML = `<div class="card"><b>جاري التحليل السريري...</b><br>سيتم مطابقة الأعراض مع قاعدة البيانات المحلية.</div>`;
}

function show(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
