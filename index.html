<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرب التشخيص السني - د. زكريا عطوني</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root{--bg:#020617;--card:#1e293b;--p:#3b82f6;--s:#10b981;--w:#f59e0b;--d:#ef4444;--t:#f8fafc;--m:#94a3b8}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
        
        /* الهيدر */
        .header{background:linear-gradient(135deg,#1e3a8a,#0f172a);padding:15px;text-align:center;border-bottom:3px solid var(--p)}
        #status{font-size:11px;color:var(--m);margin-top:5px;padding:4px 8px;border-radius:6px;display:inline-block}
        .status-ok{background:#064e3b;color:#34d399}
        .status-warn{background:#451a03;color:#fbbf24}
        
        /* الدخول */
        .auth{flex:1;display:flex;align-items:center;justify-content:center;padding:15px}
        .auth-card{background:var(--card);padding:20px;border-radius:16px;width:100%;max-width:380px;border:1px solid #334155}
        .tabs{display:flex;gap:4px;margin-bottom:15px;background:#0f172a;padding:4px;border-radius:12px}
        .tab{flex:1;padding:10px;border:none;background:transparent;color:var(--m);cursor:pointer;border-radius:8px;font-weight:600}
        .tab.active{background:var(--p);color:#fff}
        
        /* العناصر العامة */
        .inp{width:100%;padding:12px;margin:6px 0;border:1px solid #334155;border-radius:10px;background:#0f172a;color:#fff;text-align:right}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin:5px 0}
        .btn-p{background:var(--p);color:#fff}
        .btn-s{background:var(--s);color:#fff; padding: 5px 10px; width: auto; font-size: 12px;}
        .btn-d{background:var(--d);color:#fff; padding: 5px 10px; width: auto; font-size: 12px;}
        
        .app{max-width:900px;margin:auto;padding:10px;display:none;width:100%}
        .nav{display:flex;gap:5px;margin-bottom:10px}
        .view{display:none}.view.active{display:block}
        
        /* نظام الطي (Accordion) */
        .accordion{background:var(--card);border:1px solid #334155;border-radius:10px;margin-bottom:8px;overflow:hidden}
        .acc-head{padding:12px;background:rgba(255,255,255,0.05);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:bold;color:var(--p)}
        .acc-body{padding:12px;display:none;border-top:1px solid #334155;font-size:14px;line-height:1.6;background:#0f172a}
        .acc-active .acc-body{display:block}
        .acc-active .acc-head{background:rgba(59, 130, 246, 0.1)}
        
        /* الدردشة */
        #chat-box{height:400px;overflow-y:auto;background:#0f172a;border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px}
        .msg{background:#1e293b;padding:10px;border-radius:12px;max-width:85%;align-self:flex-start}
        .msg.me{align-self:flex-end;background:#1e3a8a}
        .msg-img{max-width:100%;border-radius:8px;margin-top:5px}
        
        .user-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #1e293b}
        .hide{display:none!important}
    </style>
</head>
<body>

<div class="header">
    <h1>🦷 مدرب التشخيص السني</h1>
    <div id="status" class="status-warn">⏳ جاري الاتصال...</div>
</div>

<div id="auth" class="auth">
    <div class="auth-card">
        <div class="tabs">
            <button class="tab active" onclick="sw('admin',this)">🔐 إداري</button>
            <button class="tab" onclick="sw('student',this)">🎓 طالب</button>
            <button class="tab" onclick="sw('new',this)">📝 جديد</button>
        </div>
        <div id="auth-admin">
            <input type="password" id="admin-pass" class="inp" style="text-align:center" placeholder="كلمة السر">
            <button class="btn btn-p" onclick="loginAdmin()">دخول</button>
        </div>
        <div id="auth-student" class="hide">
            <input type="text" id="std-user" class="inp" placeholder="اسم المستخدم">
            <input type="password" id="std-pass" class="inp" placeholder="كلمة السر">
            <button class="btn btn-s" style="width:100%" onclick="loginStudent()">دخول</button>
        </div>
        <div id="auth-new" class="hide">
            <input type="text" id="reg-name" class="inp" placeholder="الاسم الكامل">
            <input type="text" id="reg-user" class="inp" placeholder="اسم المستخدم المطلوب">
            <input type="password" id="reg-pass" class="inp" placeholder="كلمة السر">
            <button class="btn btn-p" onclick="registerRequest()">طلب انضمام</button>
        </div>
    </div>
</div>

<div id="app" class="app">
    <div class="nav">
        <button class="btn btn-p" style="flex:1" onclick="show('diag')">🔍 التشخيص</button>
        <button class="btn btn-p" style="background:var(--s); flex:1" onclick="show('chat')">💬 الدردشة</button>
        <button id="nav-admin" class="btn btn-d hide" style="flex:1" onclick="show('admin')">⚙️ الإدارة</button>
    </div>

    <div id="diag" class="view active">
        <div class="accordion acc-active">
            <div class="acc-head" onclick="this.parentElement.classList.toggle('acc-active')">
                <span>🔬 ابحث عن الحالة (من الداتا المرفوعة)</span>
                <span>▼</span>
            </div>
            <div class="acc-body">
                <input type="text" id="search-inp" class="inp" placeholder="اكتب عرضاً (مثل: ألم، نزف، بقعة)..." oninput="runDiag()">
            </div>
        </div>
        <div id="res"></div>
    </div>

    <div id="chat" class="view">
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px; margin-top:5px">
            <button class="btn" style="background:#334155; width:auto" onclick="document.getElementById('img-input').click()">📎</button>
            <input type="file" id="img-input" accept="image/*" class="hide" onchange="handleImg(this)">
            <input type="text" id="chat-inp" class="inp" style="margin:0; flex:1" placeholder="اكتب رسالة...">
            <button class="btn btn-p" style="width:auto" onclick="sendChat()">➤</button>
        </div>
        <small id="img-label" class="hide" style="color:var(--s)">📸 صورة جاهزة</small>
    </div>

    <div id="admin" class="view">
        <div class="accordion acc-active">
            <div class="acc-head" onclick="this.parentElement.classList.toggle('acc-active')">
                <span>📦 تغذية الحالات (JSON)</span>
                <span>▼</span>
            </div>
            <div class="acc-body">
                <textarea id="json-input" class="inp" style="height:100px; font-family:monospace; font-size:12px; text-align:left; direction:ltr" placeholder='[{"id":"1", "name":"Case", ...}]'></textarea>
                <button class="btn btn-p" onclick="importData()">استيراد الدفعة</button>
            </div>
        </div>

        <div class="accordion">
            <div class="acc-head" onclick="this.parentElement.classList.toggle('acc-active')">
                <span>👥 إدارة الأعضاء والتفعيل</span>
                <span>▼</span>
            </div>
            <div class="acc-body" id="users-list" style="padding:0">
                </div>
        </div>
    </div>
</div>

<script>
const FB_CONFIG = { 
    apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE", 
    databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com" 
};

let db = null, currentUser = null, cases = [], selectedImg = null;

try {
    firebase.initializeApp(FB_CONFIG);
    db = firebase.database();
    db.ref('.info/connected').on('value', s => { 
        const st = document.getElementById('status');
        st.className = s.val() ? "status-ok" : "status-warn";
        st.innerText = s.val() ? "🟢 متصل بالسحابة" : "🟡 أوفلاين";
    });
} catch(e) { console.error(e); }

function sw(t, b) {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    ['admin','student','new'].forEach(v => document.getElementById(`auth-${v}`).classList.add('hide'));
    document.getElementById(`auth-${t}`).classList.remove('hide');
}

function show(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function loginAdmin() {
    const p = document.getElementById('admin-pass').value;
    if(p === "9591melas" || p === "salem1959") {
        currentUser = { role: 'admin', name: 'د. زكريا', username: 'admin' };
        document.getElementById('nav-admin').classList.remove('hide');
        startApp();
    } else alert("كلمة السر خاطئة");
}

async function loginStudent() {
    const u = document.getElementById('std-user').value;
    const p = document.getElementById('std-pass').value;
    const snap = await db.ref('users/' + u).once('value');
    const d = snap.val();
    if(d && d.pass === p && d.status === 'active') {
        currentUser = { role: 'student', name: d.name, username: u };
        startApp();
    } else alert("الحساب غير موجود، كلمة السر خطأ، أو بانتظار التفعيل");
}

function registerRequest() {
    const u = document.getElementById('reg-user').value;
    const n = document.getElementById('reg-name').value;
    const p = document.getElementById('reg-pass').value;
    if(!u || !n || !p) return alert("يرجى ملء كافة الخانات");
    db.ref('users/'+u).set({ name: n, pass: p, status: 'pending' })
    .then(() => alert("تم إرسال طلبك بنجاح. يرجى التواصل مع الدكتور زكريا للتفعيل."));
}

function startApp() {
    document.getElementById('auth').classList.add('hide');
    document.getElementById('app').style.display = 'block';
    loadCases();
    loadChat();
    if(currentUser.role === 'admin') loadUsers();
}

function loadCases() {
    db.ref('clinical_cases').on('value', snap => {
        cases = [];
        snap.forEach(c => cases.push(c.val()));
    });
}

function importData() {
    try {
        const data = JSON.parse(document.getElementById('json-input').value);
        data.forEach(item => db.ref('clinical_cases/' + item.id).set(item));
        alert("تم تحديث " + data.length + " حالة.");
        document.getElementById('json-input').value = "";
    } catch(e) { alert("خطأ في التنسيق"); }
}

function runDiag() {
    const q = document.getElementById('search-inp').value.toLowerCase();
    const res = document.getElementById('res');
    res.innerHTML = "";
    if(q.length < 2) return;

    cases.filter(c => c.name.includes(q) || c.keywords.some(k => k.includes(q)))
    .forEach(c => {
        const d = document.createElement('div');
        d.className = "accordion";
        d.innerHTML = `<div class="acc-head" onclick="this.parentElement.classList.toggle('acc-active')">
            <span>${c.name}</span><span>▼</span></div>
            <div class="acc-body"><p><b>التشخيص:</b> ${c.signs}</p><p><b>العلاج:</b> ${c.treat}</p></div>`;
        res.appendChild(d);
    });
}

// وظائف الدردشة
function handleImg(i) {
    const r = new FileReader();
    r.onload = e => { selectedImg = e.target.result; document.getElementById('img-label').classList.remove('hide'); };
    r.readAsDataURL(i.files[0]);
}

function sendChat() {
    const t = document.getElementById('chat-inp').value;
    if(!t && !selectedImg) return;
    db.ref('chat').push({ name: currentUser.name, user: currentUser.username, text: t, img: selectedImg || null, time: Date.now() });
    document.getElementById('chat-inp').value = ""; selectedImg = null; document.getElementById('img-label').classList.add('hide');
}

function loadChat() {
    db.ref('chat').on('value', snap => {
        const b = document.getElementById('chat-box'); b.innerHTML = "";
        snap.forEach(s => {
            const m = s.val(); const isMe = m.user === currentUser.username;
            b.innerHTML += `<div class="msg ${isMe?'me':''}">
                <small style="color:var(--p); font-size:10px">${m.name}</small><br>
                ${m.img?`<img src="${m.img}" class="msg-img">`:''}
                <div>${m.text}</div>
                ${(isMe || currentUser.role==='admin')?`<span style="cursor:pointer; font-size:10px" onclick="db.ref('chat/${s.key}').remove()">🗑</span>`:''}
            </div>`;
        });
        b.scrollTop = b.scrollHeight;
    });
}

// وظيفة التفعيل المصححة
function loadUsers() {
    db.ref('users').on('value', snap => {
        const list = document.getElementById('users-list');
        list.innerHTML = "";
        snap.forEach(u => {
            const d = u.val();
            const id = u.key;
            const div = document.createElement('div');
            div.className = "user-item";
            div.innerHTML = `
                <div style="font-size:13px"><b>${d.name}</b><br><small>${d.status === 'active' ? '✅ مفعل' : '⏳ معلق'}</small></div>
                <div>
                    ${d.status === 'pending' ? `<button class="btn-s" onclick="activateUser('${id}')">تفعيل</button>` : ''}
                    <button class="btn-d" onclick="deleteUser('${id}')">حذف</button>
                </div>`;
            list.appendChild(div);
        });
    });
}

function activateUser(id) {
    db.ref('users/' + id).update({ status: 'active' })
    .then(() => alert("تم تفعيل الحساب بنجاح"));
}

function deleteUser(id) {
    if(confirm("هل أنت متأكد من حذف هذا العضو؟")) {
        db.ref('users/' + id).remove();
    }
}
</script>
</body>
</html>
