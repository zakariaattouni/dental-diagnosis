<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار Firebase</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #f0f9ff; }
        .box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin: 5px 0; }
        input { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; margin: 5px 0; font-size: 15px; }
        #log { background: #1e293b; color: #10b981; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>🔧 اختبار Firebase</h1>
    
    <div class="box">
        <h3>1️⃣ اختبار الاتصال</h3>
        <button onclick="testConnection()">🔌 اختبار الاتصال بـ Firebase</button>
    </div>

    <div class="box">
        <h3>2️⃣ إرسال بيانات اختبار</h3>
        <input type="text" id="test-name" placeholder="الاسم">
        <input type="email" id="test-email" placeholder="البريد">
        <button onclick="saveTest()">💾 حفظ في Firebase</button>
    </div>

    <div class="box">
        <h3>3️⃣ قراءة البيانات</h3>
        <button onclick="readData()">📖 قراءة البيانات</button>
        <div id="result" style="margin-top:10px"></div>
    </div>

    <div class="box">
        <h3>📋 السجل</h3>
        <div id="log">جاهز...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const cfg = {
            apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE",
            authDomain: "diagnosis-6ea4b.firebaseapp.com",
            databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com",
            projectId: "diagnosis-6ea4b"
        };

        let db;        const log = msg => document.getElementById('log').innerHTML += '<div>' + msg + '</div>';

        try {
            firebase.initializeApp(cfg);
            db = firebase.database();
            log('✅ Firebase تم تهيئته');
        } catch(e) {
            log('❌ خطأ: ' + e.message);
        }

        function testConnection() {
            log('🔄 جاري الاتصال...');
            db.ref('.info/connected').on('value', snapshot => {
                if (snapshot.val() === true) {
                    log('✅ متصل بـ Firebase بنجاح!');
                } else {
                    log('❌ غير متصل - تحقق من الإنترنت');
                }
            });
        }

        function saveTest() {
            const name = document.getElementById('test-name').value;
            const email = document.getElementById('test-email').value;
            
            if (!name || !email) {
                log('⚠️ أدخل الاسم والبريد');
                return;
            }

            const testData = {
                name: name,
                email: email,
                status: 'pending',
                date: Date.now(),
                test: true
            };

            log('📤 جاري الحفظ: ' + JSON.stringify(testData));
            
            db.ref('users').push(testData)
                .then(ref => {
                    log('✅ تم الحفظ بنجاح! ID: ' + ref.key);
                    log('🔗 الرابط: https://diagnosis-6ea4b-default-rtdb.firebaseio.com/users/' + ref.key + '.json');
                    alert('✅ تم الحفظ! اذهب إلى Firebase > Data لترى البيانات');
                })
                .catch(err => {
                    log('❌ فشل الحفظ: ' + err.message);
                    alert('❌ خطأ: ' + err.message);
                });        }

        function readData() {
            log('📖 جاري القراءة...');
            db.ref('users').once('value')
                .then(snapshot => {
                    const data = snapshot.val();
                    if (data) {
                        const count = Object.keys(data).length;
                        log('✅ تم قراءة ' + count + ' سجلات');
                        document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                    } else {
                        log('⚠️ لا توجد بيانات');
                        document.getElementById('result').innerHTML = 'لا توجد بيانات';
                    }
                })
                .catch(err => log('❌ خطأ: ' + err.message));
        }
    </script>
</body>
</html>
