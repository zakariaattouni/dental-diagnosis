<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg: linear-gradient(135deg, #0f172a, #1e40af);
            --card: #ffffff; --primary: #2563eb; --primary-dark: #1d4ed8;
            --success: #10b981; --warn: #f59e0b; --danger: #ef4444;
            --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
            --radius: 16px; --shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; padding: 16px; }
        
        .auth-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 380px; box-shadow: var(--shadow); text-align: center; }
        .icon { width: 64px; height: 64px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 32px; color: #fff; }
        h1 { font-size: 22px; margin-bottom: 6px; color: var(--text); }
        .sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
        .input { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; text-align: center; margin-bottom: 12px; background: #f8fafc; }
        .input:focus { outline: none; border-color: var(--primary); background: #fff; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
        .btn:active { transform: scale(0.98); }
        .btn-demo { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .link { color: var(--primary); font-size: 13px; cursor: pointer; display: block; margin-top: 10px; }
        .hide { display: none !important; }
        
        header { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 14px 14px; margin-bottom: 16px; }
        .logo { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .badge { background: #ef4444; padding: 2px 7px; border-radius: 10px; font-size: 11px; margin-left: 8px; }
        .btn-sm { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 5px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        
        main { flex: 1; padding-bottom: 20px; max-width: 800px; margin: auto; width: 100%; }
        .view { display: none; animation: fade 0.3s ease; }
        .view.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--card); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
        .card h3 { font-size: 17px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
        .stat { background: #f1f5f9; padding: 12px; border-radius: 10px; text-align: center; }
        .num { font-size: 20px; font-weight: 800; color: var(--primary); }
        .label { font-size: 11px; color: var(--muted); margin-top: 4px; }
        
        textarea { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 12px; min-height: 110px; resize: vertical; background: #f8fafc; font-size: 14px; margin-bottom: 14px; line-height: 1.5; }
        textarea:focus { outline: none; border-color: var(--primary); background: #fff; }
                .res-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 14px; padding: 16px; margin-top: 16px; }
        .res-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #bbf7d0; }
        .res-title { font-size: 16px; font-weight: 700; color: #047857; display: flex; align-items: center; gap: 8px; }
        .confidence { font-size: 12px; font-weight: 600; padding: 4px 8px; border-radius: 6px; }
        .conf-high { background: #d1fae5; color: #065f46; }
        .conf-mid { background: #fef3c7; color: #92400e; }
        .conf-low { background: #f1f5f9; color: #475569; }
        
        .diag-item { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px; border-right: 4px solid var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .diag-item strong { display: block; color: var(--primary-dark); margin-bottom: 6px; font-size: 15px; }
        .diag-item p { font-size: 13px; line-height: 1.6; color: #334155; margin-bottom: 4px; }
        .diag-item .warn { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 8px; border-radius: 6px; margin-top: 8px; font-size: 12px; font-weight: 600; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        
        .empty-state { text-align: center; color: var(--muted); padding: 30px 10px; font-size: 14px; }
    </style>
</head>

            {

                clusters: [["تورم","تنفس"],["تورم","لسان"]],
                desc: "استجابة مناعية سريعة قد تهدد الحياة. تورم مفاجئ في الوجه/الحلق، صعوبة تنفس، طفح جلدي.",
                treat: "إبينفرين فوري (EpiPen) + طوارئ + مضادات هستامين + كورتيزون وريدي.",
                warn: "🚨 حالة تهدد الحياة! لا تنتظر. اتصل بالإسعاف فوراً عند صعوبة التنفس أو تورم الحلق."

        //  محرك المطابقة المتقدم
        function normalizeText(text) {
            return text
                .replace(/[\u064B-\u065F\u0670]/g, '') // إزالة التشكيل
                .replace(/[أإآٱ]/g, 'ا')
                .replace(/ة/g, 'ه')
                .replace(/ى/g, 'ي')
                .replace(/ؤ/g, 'و')
                .replace(/ئ/g, 'ي')
                .replace(/[ًٌٍَُِّْ~]/g, '')
                .replace(/\s+/g, ' ')
                .trim()
                .toLowerCase();
        }

        const SYNONYMS = {
            'يوجعني':'ألم','وجع':'ألم','موجع':'ألم','يؤلمني':'ألم','بيوجع':'ألم','أوجع':'ألم',
            'ضرس':'سن','اضراس':'أسنان','سنان':'أسنان','سني':'أسنان','سنا':'أسنان',
            'لثتي':'لثة','لثه':'لثة','لثته':'لثة',
            'صديد':'قيح','خرّاج':'خراج','خراج':'خراج','خريج':'خراج',
            'بارد':'مبرد','ساخن':'مسخن','مايه':'ماء','مي':'ماء','هوا':'هواء',
            'ليل':'ليلي','نوم':'نوم','باليل':'ليل','ينام':'ليل',
            'تورم':'انتفاخ','ورم':'تورم','منتفخ':'تورم','ورمه':'تورم',
            'نزيف':'دم','ينزف':'نزيف','دمه':'نزيف',
            'حساس':'حساسية','حساسة':'حساسية','بيحس':'حساسية',
            'كسر':'انكسار','شقق':'تشقق','متشقق':'تشقق','ينكسر':'كسر',
            'مضغ':'مضغ','أمضغ':'مضغ','اكل':'مضغ','يمضغ':'مضغ',
            'جذر':'عصب','عصب':'جذر','عصبي':'جذر',
            'رائحة':'رائحة','ريحة':'رائحة','نفَس':'رائحة','بخر':'رائحة',
            'قرحة':'قرحة','تقرح':'قرحة','جرح':'قرحة','آفة':'قرحة',
            'أبيض':'أبيض','بقعة':'بقعة','لويحة':'لويحة','طلاء':'أبيض',
            'طقطقة':'فرقعة','يفرقع':'طقطقة','يطقطق':'طقطقة',
            'صداع':'راس','رأس':'صداع','راسي':'صداع',
            'صعوبة':'صعب','يصعب':'صعوبة','مش':'لا','ما':'لا','مو':'لا'
        };
        function calculateConfidence(text) {
            const norm = normalizeText(text);
            const words = norm.split(' ');
            let maxPossible = 0;
            
            const results = DENTAL_KB.map(disease => {
                let score = 0;
                
                // 1. Exact Keyword Matching (Weight: 2)
                disease.keywords.exact.forEach(kw => {
                    if (norm.includes(kw)) score += 2;
                });

                // 2. Synonym & Dialect Matching (Weight: 1.5)
                disease.keywords.related.forEach(kw => {
                    if (words.some(w => SYNONYMS[w] === kw || SYNONYMS[kw] === w || w.includes(kw) || kw.includes(w))) {
                        score += 1.5;
                    }
                });

                // 3. Symptom Clustering Boost (Weight: +3 to +5)
                disease.clusters.forEach(cluster => {
                    if (cluster.every(sym => norm.includes(sym))) {
                        score += 4; // High boost for co-occurring symptoms
                    }
                });

                // Calculate max possible for normalization
                let diseaseMax = (disease.keywords.exact.length * 2) + (disease.keywords.related.length * 1.5) + (disease.clusters.length * 4);
                maxPossible += diseaseMax;

                return { ...disease, rawScore: score, maxScore: diseaseMax };
            });

            // Normalize & Filter
            const filtered = results.filter(r => r.rawScore > 2).map(r => {
                const confidence = Math.min(98, Math.round((r.rawScore / r.maxScore) * 100));
                let level = confidence > 70 ? 'عالية' : confidence > 40 ? 'متوسطة' : 'منخفضة';
                let levelClass = confidence > 70 ? 'conf-high' : confidence > 40 ? 'conf-mid' : 'conf-low';
                return { ...r, confidence, level, levelClass };
            }).sort((a, b) => b.confidence - a.confidence);

            return filtered.slice(0, 3);
        }

        function runDiagnosis() {
            const text = $('sym').value.trim();
            if (!text) return toast('⚠️ يرجى كتابة الأعراض أولاً');
            
            const results = calculateConfidence(text);            let html = '';

            if (results.length === 0) {
                html = `<div class="res-box"><div class="res-header"><div class="res-title">📊 نتيجة التحليل</div></div>
                <div class="empty-state">لم يتم العثور على تطابق قوي. يرجى إضافة تفاصيل أكثر مثل:<br>• نوع الألم وموقعه<br>• المدة الزمنية<br>• المحفزات (بارد، ساخن، مضغ)<br>• الأعراض المصاحبة</div></div>`;
            } else {
                html = `<div class="res-box"><div class="res-header"><div class="res-title">📊 النتائج التشخيصية المحتملة</div><span style="font-size:11px;color:#64748b">بناءً على ${text.split(' ').length} كلمة تم تحليلها</span></div>`;
                
                results.forEach((r, i) => {
                    html += `<div class="diag-item">
                        <strong>#${i+1} ${r.name} <span style="font-size:11px;color:#64748b;font-weight:400">(${r.category})</span></strong>
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <span class="confidence ${r.levelClass}">نسبة التطابق: ${r.confidence}% (${r.level})</span>
                            <span style="font-size:11px;color:#64748b">الخطورة: <b style="color:${r.severity==='طوارئ'?'#ef4444':r.severity==='عالي'?'#f59e0b':'#10b981'}">${r.severity}</b></span>
                        </div>
                        <p><b>📖 الوصف:</b> ${r.desc}</p>
                        <p><b>💊 التدبير المقترح:</b> ${r.treat}</p>
                        ${r.warn ? `<div class="warn">⚠️ ${r.warn}</div>` : ''}
                    </div>`;
                });
                html += `</div>`;
            }
            
            html += `<div style="background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:10px;border-radius:8px;margin-top:14px;text-align:center;font-size:12px;">
                ⚕️ تنبيه طبي: هذا التحليل تعليمي辅助ي فقط ولا يغني عن الفحص السريري المباشر والأشعة التشخيصية. راجع الطبيب المختص دائماً.
            </div>`;
            
            $('res').innerHTML = html;
        }

        // Firebase Admin Listeners
        function loadData() {
            if (!db) return;
            db.ref('users').on('value', snap => {
                const users = []; snap.forEach(c => users.push(c.val()));
                const pend = users.filter(u => u.status === 'pending');
                $('c-p').textContent = pend.length; $('c-a').textContent = users.filter(u => u.status === 'active').length; $('c-t').textContent = users.length;
                $('badge').textContent = pend.length;
                $('req-list').innerHTML = pend.length ? pend.map(u => `<div class="req"><strong>${u.name}</strong><br><small>${u.email}</small></div>`).join('') : '<div class="empty-state">لا توجد طلبات جديدة</div>';
            });
        }

        // Global Bindings
        window.quickLogin=quickLogin; window.login=login; window.logout=logout; window.goDoc=goDoc; window.goAdmin=goAdmin; window.runDiagnosis=runDiagnosis;
        window.onload = () => { const s=localStorage.getItem('d_session'); if(s){ user=JSON.parse(s); enterApp(); } };
    </script>
