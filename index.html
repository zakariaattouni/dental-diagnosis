<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرب التشخيص السني - د. زكريا عطوني</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root{--bg:#020617;--card:#1e293b;--p:#3b82f6;--s:#10b981;--w:#f59e0b;--d:#ef4444;--t:#f8fafc;--m:#94a3b8}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
        
        /* الهيدر */
        .header{background:linear-gradient(135deg,#1e3a8a,#0f172a);padding:15px;text-align:center;border-bottom:3px solid var(--p)}
        #status{font-size:11px;color:var(--m);margin-top:5px;padding:4px 8px;border-radius:6px;display:inline-block}
        .status-ok{background:#064e3b;color:#34d399}
        .status-warn{background:#451a03;color:#fbbf24}
        
        /* الدخول */
        .auth{flex:1;display:flex;align-items:center;justify-content:center;padding:15px}
        .auth-card{background:var(--card);padding:20px;border-radius:16px;width:100%;max-width:380px;border:1px solid #334155}
        .tabs{display:flex;gap:4px;margin-bottom:15px;background:#0f172a;padding:4px;border-radius:12px}
        .tab{flex:1;padding:10px;border:none;background:transparent;color:var(--m);cursor:pointer;border-radius:8px;font-weight:600}
        .tab.active{background:var(--p);color:#fff}
        
        /* العناصر العامة */
        .inp{width:100%;padding:12px;margin:6px 0;border:1px solid #334155;border-radius:10px;background:#0f172a;color:#fff;text-align:right}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin:5px 0}
        .btn-p{background:var(--p);color:#fff}
        .btn-s{background:var(--s);color:#fff}
        .btn-d{background:var(--d);color:#fff}
        
        .app{max-width:900px;margin:auto;padding:10px;display:none;width:100%}
        .nav{display:flex;gap:5px;margin-bottom:10px}
        .view{display:none}.view.active{display:block}
        
        /* خاصية الطي */
        .accordion{background:var(--card);border:1px solid #334155;border-radius:10px;margin-bottom:8px;overflow:hidden}
        .acc-head{padding:12px;background:rgba(255,255,255,0.05);cursor:pointer;display:flex;justify-content:space-between;font-weight:bold}
        .acc-body{padding:12px;display:none;border-top:1px solid #334155;font-size:14px;line-height:1.6}
        .acc-active .acc-body{display:block}
        
        /* الدردشة */
        #chat-box{height:400px;overflow-y:auto;background:#0f172a;border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px}
        .msg{background:#1e293b;padding:10px;border-radius:12px;max-width:85%;align-self:flex-start}
        .msg.me{align-self:flex-end;background:#1e3a8a}
        .msg-img{max-width:100%;border-radius:8px;margin-top:5px}
        
        .hide{display:none!important}
    </style>
</head>
<body>

<div class="header">
    <h1>🦷 مدرب التشخيص السني</h1>
    <div id="status" class="status-warn">⏳ جاري الاتصال...</div>
</div>

<div id="auth" class="auth">
    <div class="auth-card">
        <div class="tabs">
            <button class="tab active" onclick="sw('admin',this)">🔐 إداري</button>
            <button class="tab" onclick="sw('student',this)">🎓 طالب</button>
            <button class="tab" onclick="sw('new',this)">📝 جديد</button>
        </div>
        <div id="auth-admin">
            <input type="password" id="admin-pass" class="inp" style="text-align:center" placeholder="كلمة السر">
            <button class="btn btn-p" onclick="loginAdmin()">دخول</button>
        </div>
        <div id="auth-student" class="hide">
            <input type="text" id="std-user" class="inp" placeholder="اسم المستخدم">
            <input type="password" id="std-pass" class="inp" placeholder="كلمة السر">
            <button class="btn btn-s" onclick="loginStudent()">دخول</button>
        </div>
        <div id="auth-new" class="hide">
            <input type="text" id="reg-name" class="inp" placeholder="الاسم الكامل">
            <input type="text" id="reg-user" class="inp" placeholder="اسم المستخدم">
            <input type="password" id="reg-pass" class="inp" placeholder="كلمة السر">
            <button class="btn btn-p" onclick="registerRequest()">طلب انضمام</button>
        </div>
    </div>
</div>

<div id="app" class="app">
    <div class="nav">
        <button class="btn btn-p" style="flex:1" onclick="show('diag')">🔍 التشخيص</button>
        <button class="btn btn-s" style="flex:1" onclick="show('chat')">💬 الدردشة</button>
        <button id="nav-admin" class="btn btn-d hide" style="flex:1" onclick="show('admin')">⚙️ الإدارة</button>
    </div>

    <div id="diag" class="view active">
        <div class="accordion acc-active">
            <div class="acc-head">🔬 محرك البحث عن الحالات</div>
            <div class="acc-body">
                <input type="text" id="search-inp" class="inp" placeholder="اكتب عرضاً (مثل: ألم ذروي، نزف، بقعة بيضاء)..." oninput="runDiag()">
            </div>
        </div>
        <div id="res"></div>
    </div>

    <div id="chat" class="view">
        <div id="chat-box"></div>
        <div id="reply-preview" style="display:none; background:#1e293b; padding:5px; border-bottom:2px solid var(--w)">
            <small id="reply-text"></small> <span onclick="cancelReply()">✕</span>
        </div>
        <div style="display:flex; gap:5px; margin-top:5px">
            <button class="btn" style="background:#334155; width:auto" onclick="document.getElementById('img-input').click()">📎</button>
            <input type="file" id="img-input" accept="image/*" class="hide" onchange="handleImg(this)">
            <input type="text" id="chat-inp" class="inp" style="margin:0; flex:1" placeholder="اكتب رسالة...">
            <button class="btn btn-p" style="width:auto" onclick="sendChat()">➤</button>
        </div>
        <small id="img-label" class="hide" style="color:var(--s)">📸 صورة جاهزة</small>
    </div>

    <div id="admin" class="view">
        <div class="accordion acc-active">
            <div class="acc-head">📦 تغذية الحالات (JSON)</div>
            <div class="acc-body">
                <textarea id="json-input" class="inp" style="height:100px; font-family:monospace; font-size:12px; text-align:left; direction:ltr" placeholder='[{"id":"1", "name":"Case Name", ...}]'></textarea>
                <button class="btn btn-p" onclick="importData()">استيراد الدفعة</button>
            </div>
        </div>
        <div class="accordion">
            <div class="acc-head">👥 إدارة الأعضاء</div>
            <div id="users-list" class="acc-body"></div>
        </div>
    </div>
</div>

<script>
// إعدادات فايربيس
const FB_CONFIG = { 
    apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE", 
    databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com" 
};

let db = null, currentUser = null, cases = [], selectedImg = null, replyTo = null;

try {
    firebase.initializeApp(FB_CONFIG);
    db = firebase.database();
    db.ref('.info/connected').on('value', s => { 
        document.getElementById('status').className = s.val() ? "status-ok" : "status-warn";
        document.getElementById('status').innerText = s.val() ? "🟢 متصل بالسحابة" : "🟡 أوفلاين";
    });
} catch(e) { console.error(e); }

// التنقل والتبديل
function sw(t, b) {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    ['admin','student','new'].forEach(v => document.getElementById(`auth-${v}`).classList.add('hide'));
    document.getElementById(`auth-${t}`).classList.remove('hide');
}

function show(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// الدخول والإدارة
function loginAdmin() {
    if(["9591melas","salem1959"].includes(document.getElementById('admin-pass').value)) {
        currentUser = { role: 'admin', name: 'د. زكريا', username: 'admin' };
        document.getElementById('nav-admin').classList.remove('hide');
        startApp();
    } else alert("خطأ!");
}

async function loginStudent() {
    const u = document.getElementById('std-user').value;
    const p = document.getElementById('std-pass').value;
    const snap = await db.ref('users/' + u).once('value');
    if(snap.val()?.pass === p && snap.val()?.status === 'active') {
        currentUser = { role: 'student', name: snap.val().name, username: u };
        startApp();
    } else alert("بيانات خاطئة أو غير مفعل");
}

function registerRequest() {
    const u = document.getElementById('reg-user').value;
    db.ref('users/'+u).set({
        name: document.getElementById('reg-name').value,
        pass: document.getElementById('reg-pass').value,
        status: 'pending'
    }).then(() => alert("تم الإرسال.. بانتظار التفعيل"));
}

function startApp() {
    document.getElementById('auth').classList.add('hide');
    document.getElementById('app').style.display = 'block';
    loadCases();
    loadChat();
    loadUsers();
}

// إدارة البيانات
function loadCases() {
    db.ref('clinical_cases').on('value', snap => {
        cases = [];
        snap.forEach(c => cases.push(c.val()));
    });
}

function importData() {
    try {
        const data = JSON.parse(document.getElementById('json-input').value);
        if(!Array.isArray(data)) throw "يجب أن يكون ملف JSON مصفوفة []";
        data.forEach(item => db.ref('clinical_cases/' + item.id).set(item));
        alert("تمت إضافة " + data.length + " حالة بنجاح!");
        document.getElementById('json-input').value = "";
    } catch(e) { alert("خطأ في تنسيق البيانات: " + e); }
}

// محرك التشخيص والطي
function runDiag() {
    const query = document.getElementById('search-inp').value.toLowerCase();
    const resDiv = document.getElementById('res');
    resDiv.innerHTML = "";
    
    if(query.length < 2) return;

    const filtered = cases.filter(c => 
        c.name.includes(query) || 
        c.keywords.some(k => k.includes(query))
    );

    filtered.forEach(c => {
        const div = document.createElement('div');
        div.className = "accordion";
        div.innerHTML = `
            <div class="acc-head" onclick="this.parentElement.classList.toggle('acc-active')">
                <span>${c.name}</span> <span>▼</span>
            </div>
            <div class="acc-body">
                <p><b>الفئة:</b> ${c.cat}</p>
                <p><b>العلامات:</b> ${c.signs}</p>
                <p><b>العلاج:</b> ${c.treat}</p>
                <p><b>التشخيص التفريقي:</b> ${c.diff}</p>
            </div>
        `;
        resDiv.appendChild(div);
    });
}

// الدردشة
function handleImg(input) {
    const file = input.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = e => {
            selectedImg = e.target.result;
            document.getElementById('img-label').classList.remove('hide');
        };
        reader.readAsDataURL(file);
    }
}

function sendChat() {
    const txt = document.getElementById('chat-inp').value;
    if(!txt && !selectedImg) return;
    db.ref('chat').push({
        name: currentUser.name,
        user: currentUser.username,
        text: txt,
        img: selectedImg || null,
        time: Date.now()
    });
    document.getElementById('chat-inp').value = "";
    selectedImg = null;
    document.getElementById('img-label').classList.add('hide');
}

function loadChat() {
    db.ref('chat').on('value', snap => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            const isMe = m.user === currentUser.username;
            box.innerHTML += `
                <div class="msg ${isMe?'me':''}">
                    <small style="color:var(--p)">${m.name}</small><br>
                    ${m.img? `<img src="${m.img}" class="msg-img" onclick="window.open(this.src)">` : ''}
                    <div>${m.text}</div>
                    <small style="font-size:8px; opacity:0.5" onclick="if(confirm('حذف؟')) db.ref('chat/${c.key}').remove()">🗑</small>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
}

function loadUsers() {
    db.ref('users').on('value', snap => {
        const list = document.getElementById('users-list');
        list.innerHTML = "";
        snap.forEach(u => {
            const d = u.val();
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #334155; padding:5px">
                    <span>${d.name} (${d.status})</span>
                    <button class="btn-s" style="padding:2px 10px" onclick="db.ref('users/${u.key}').update({status:'active'})">تفعيل</button>
                </div>`;
        });
    });
}

// تفعيل الضغط على العناوين
document.querySelectorAll('.acc-head').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('acc-active'));
});
</script>
</body>
</html>
