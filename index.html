<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المنصة المتكاملة - د. زكريا عطوني</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --p: #3b82f6; --s: #10b981; --bg: #020617; --c: #1e293b; --t: #f8fafc; --muted: #94a3b8; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--t); margin: 0; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, #1e3a8a, #020617); padding: 25px; border-bottom: 3px solid var(--p); text-align: center; }
        .header h1 { margin: 0; font-size: 24px; text-shadow: 0 0 10px rgba(59,130,246,0.5); }

        /* شاشة الدخول الثلاثية */
        .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 20px; }
        .auth-card { background: var(--c); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #334155; }
        .auth-tabs { display: flex; gap: 5px; margin-bottom: 25px; background: #0f172a; padding: 5px; border-radius: 12px; }
        .auth-tab { flex: 1; padding: 12px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .auth-tab.active { background: var(--p); color: white; }

        .input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: var(--s); color: white; }

        /* الواجهة الرئيسية */
        .main-app { max-width: 1000px; margin: auto; padding: 20px; display: none; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s; }
        .card { background: var(--c); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }

        /* الإحصائيات والجداول */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-item { background: #0f172a; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #1e293b; }
        .stat-num { font-size: 24px; font-weight: 800; color: var(--p); display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #334155; }

        /* محرك التشخيص */
        textarea { width: 100%; height: 120px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: white; padding: 15px; font-size: 16px; resize: none; margin-bottom: 10px; outline: none; }
        .diag-res { border-right: 4px solid var(--p); background: #1a2234; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .tag { display: inline-block; padding: 2px 8px; background: #334155; border-radius: 4px; font-size: 11px; margin: 2px; color: #93c5fd; }

        .hide { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h1>مدرب التشخيص السني</h1>
    <div id="status-bar" style="font-size: 12px; color: var(--muted); margin-top: 8px;">النظام جاهز</div>
</div>

<div id="auth-view" class="auth-screen">
    <div class="auth-card">
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('admin', this)">🔐 إداري</button>
            <button class="auth-tab" onclick="switchAuth('student', this)">🎓 طالب</button>
            <button class="auth-tab" onclick="switchAuth('new', this)">📝 جديد</button>
        </div>

        <div id="auth-admin">
            <input type="password" id="admin-pass" class="input" placeholder="كلمة السر الإدارية">
            <button class="btn btn-p" onclick="loginAdmin()">دخول المسؤول</button>
        </div>

        <div id="auth-student" class="hide">
            <input type="text" id="std-id" class="input" placeholder="الرقم الجامعي">
            <input type="password" id="std-pass" class="input" placeholder="كلمة المرور">
            <button class="btn btn-s" onclick="loginStudent()">دخول الطلاب</button>
        </div>

        <div id="auth-new" class="hide">
            <input type="text" id="reg-name" class="input" placeholder="الاسم الكامل">
            <input type="text" id="reg-phone" class="input" placeholder="رقم الهاتف">
            <button class="btn btn-p" onclick="alert('تم إرسال طلب الانضمام')">تقديم طلب</button>
        </div>
    </div>
</div>

<div id="main-app" class="main-app">
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn btn-p" style="flex:1" onclick="showView('diag-view')">🔍 محرك الفحص</button>
        <button id="nav-admin" class="btn btn-s hide" style="flex:1" onclick="showView('admin-view')">⚙️ الإدارة</button>
    </div>

    <div id="diag-view" class="view active">
        <div class="card">
            <h3 style="margin-top:0">🔬 التشخيص السريري المتقدم</h3>
            <textarea id="diag-input" placeholder="صف الحالة هنا.. (مثال: ألم ليلي نابض مع تورم)"></textarea>
            <button class="btn btn-p" onclick="runExpertDiag()">تحليل الحالة بالذكاء المحلي</button>
        </div>
        <div id="diag-results"></div>
    </div>

    <div id="admin-view" class="view">
        <div class="card">
            <h3>📊 لوحة البيانات</h3>
            <div class="stats-grid">
                <div class="stat-item"><span class="stat-num" id="stat-online">1</span>متصل حالياً</div>
                <div class="stat-item"><span class="stat-num" id="stat-cases">4</span>حالات ذكية</div>
            </div>
            <div id="online-list" style="font-size:12px; color:var(--s); text-align:center;"></div>
        </div>

        <div class="card">
            <h3>📥 تحديث البيانات (JSON)</h3>
            <textarea id="json-input" placeholder="الصق مصفوفة الحالات هنا..." style="height:80px; font-size:11px;"></textarea>
            <button class="btn btn-s" onclick="importData()">حفظ التعديلات في السحابة</button>
        </div>

        <div class="card">
            <h3>👥 الأطباء المسجلون</h3>
            <div style="overflow-x:auto">
                <table id="user-table">
                    <thead><tr><th>الاسم</th><th>التوقيت</th><th>الحالة</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE", databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let user = null;

    const CLINICAL_BRAIN = [
        { id:1, name:"التهاب لب حاد", logic:{h:["نابض","ليلي","عفوي","لا انام"], m:["بارد","حار"]}, signs:"ألم عفوي حاد يزداد ليلاً وعند الاستلقاء.", treat:"استئصال اللب الحيوى فوراً." },
        { id:2, name:"خراج ذروي حاد", logic:{h:["تورم","انتفاخ","نقرة","قيح"], m:["حرارة","خد"]}, signs:"ألم شديد عند النقر العمودي وتورم لثوي أو وجهي.", treat:"تصريف القيح ومضادات حيوية." },
        { id:3, name:"تواج (ضرس العقل)", logic:{h:["عقل","بلع","فتحة الفم","خلف"], m:["رائحة","اذن"]}, signs:"التهاب الأنسجة حول تاج الرحى الثالثة.", treat:"غسيل موضعي، مضادات، ثم القلع." },
        { id:4, name:"التبنخ الجاف", logic:{h:["بعد القلع","عظم مكشوف","مكان الخلع"], m:["دخان","يوم ثالث"]}, signs:"ألم شديد جداً يشع للأذن يبدأ بعد القلع بـ 3 أيام.", treat:"تطهير الفجوة ووضع Alveogyl." }
    ];

    function switchAuth(tab, btn) {
        document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('auth-admin').classList.add('hide');
        document.getElementById('auth-student').classList.add('hide');
        document.getElementById('auth-new').classList.add('hide');
        document.getElementById(`auth-${tab}`).classList.remove('hide');
    }

    function loginAdmin() {
        if(document.getElementById('admin-pass').value === "salem1959") {
            user = { role: 'admin', name: 'د. عطوني' };
            document.getElementById('nav-admin').classList.remove('hide');
            startApp();
        } else { alert("خطأ في كلمة السر"); }
    }

    function loginStudent() {
        const id = document.getElementById('std-id').value;
        if(id) { user = { role: 'student', name: 'دكتور/ة ' + id }; startApp(); }
    }

    function startApp() {
        document.getElementById('auth-view').classList.add('hide');
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('status-bar').textContent = "مرحباً: " + user.name;
        if(user.role === 'admin') showView('admin-view');
        syncData();
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById(v).classList.add('active');
    }

    function runExpertDiag() {
        const input = document.getElementById('diag-input').value.toLowerCase();
        let results = [];
        CLINICAL_BRAIN.forEach(dis => {
            let score = 0; let matched = [];
            dis.logic.h.forEach(k => { if(input.includes(k)) { score += 20; matched.push(k); } });
            dis.logic.m.forEach(k => { if(input.includes(k)) { score += 10; matched.push(k); } });
            if(dis.name.includes("لب") && input.includes("ليلي") && input.includes("نابض")) score += 30;
            if(score > 5) results.push({...dis, score: Math.min(99, score), matched});
        });
        results.sort((a,b) => b.score - a.score);
        displayDiag(results);
    }

    function displayDiag(arr) {
        const out = document.getElementById('diag-results');
        if(arr.length === 0) { out.innerHTML = "<div class='card'>لم يتم العثور على تطابق. حاول ذكر أعراض أدق.</div>"; return; }
        let html = "<h4>نتائج التحليل المقترحة:</h4>";
        arr.forEach(r => {
            html += `<div class="diag-res">
                <b style="color:var(--p)">${r.name}</b> <span style="float:left; font-size:12px;">ثقة ${r.score}%</span>
                <div style="margin:5px 0">${r.matched.map(m => `<span class="tag">${m}</span>`).join('')}</div>
                <p style="font-size:12px; margin:5px 0"><b>📌 العلامات:</b> ${r.signs}</p>
                <p style="font-size:12px; color:var(--s)"><b>💊 العلاج:</b> ${r.treat}</p>
            </div>`;
        });
        out.innerHTML = html;
    }

    function syncData() {
        db.ref('online/' + user.name.replace(/\s/g,'_')).set({name: user.name, time: Date.now()}).then(() => {
            db.ref('online/' + user.name.replace(/\s/g,'_')).onDisconnect().remove();
        });
        db.ref('online').on('value', snap => {
            document.getElementById('stat-online').textContent = snap.numChildren();
            let n = ""; snap.forEach(c => n += " • " + c.val().name);
            document.getElementById('online-list').textContent = n;
        });
        document.getElementById('stat-cases').textContent = CLINICAL_BRAIN.length;
        db.ref('online').on('value', snap => {
            let h = ""; snap.forEach(c => {
                h += `<tr><td>${c.val().name}</td><td>${new Date(c.val().time).toLocaleTimeString('ar-EG')}</td><td><span style="color:var(--s)">متصل</span></td></tr>`;
            });
            document.querySelector('#user-table tbody').innerHTML = h;
        });
    }

    function importData() {
        try { JSON.parse(document.getElementById('json-input').value); alert("✅ تم التحديث"); } catch(e) { alert("خطأ JSON"); }
    }
</script>
</body>
</html>
